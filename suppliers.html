<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>طيب الحي — الموردون</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--g:#C9A84C;--gd:#a8893a;--gl:rgba(201,168,76,.12);--bg:#FFFFFF;--s1:#FFFFFF;--s2:#FFFFFF;--s3:#F7F4ED;--s4:#F0EAE0;--bd:#EBE3D5;--bd2:#DDD2BC;--tx:#1F1709;--tx2:#4A3B26;--tx3:#7A6A50;--tx4:#A99878;--gr:#2e7d5c;--grl:rgba(46,125,92,.1);--rd:#c0392b;--rdl:rgba(192,57,43,.08);--bl:#4a6ab0;--bll:rgba(74,106,176,.08);--R:10px;--R2:14px;--SH:0 2px 12px rgba(60,40,10,.06)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
a{text-decoration:none;color:inherit}button{font-family:inherit;cursor:pointer;border:none;background:none}
.mono{font-family:'IBM Plex Mono',monospace}

.topbar{height:60px;background:var(--s1);border-bottom:1.5px solid var(--bd);box-shadow:var(--SH);display:flex;align-items:center;justify-content:space-between;padding:0 22px;position:sticky;top:0;z-index:50}
.tb-brand{display:flex;align-items:center;gap:10px}
.tb-logo{width:42px;height:42px;background:#fff;border:1.5px solid var(--bd2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;overflow:hidden;flex-shrink:0;box-shadow:0 1px 4px rgba(60,40,10,.06)}
.tb-logo img{width:100%;height:100%;object-fit:cover}
.tb-name{font-size:1.02rem;font-weight:800;color:var(--gd)}
.tb-nav{display:flex;gap:2px}
.tb-link{padding:5px 13px;border-radius:6px;font-size:.82rem;color:var(--tx3);transition:.12s;text-decoration:none}
.tb-link:hover{background:var(--s3);color:var(--tx2)}
.tb-link.on{background:var(--g);color:#1C1208;font-weight:700}
.tb-user{font-size:.78rem;color:var(--tx3);background:var(--s3);padding:4px 11px;border-radius:14px}
.tb-out{font-size:.76rem;color:var(--tx3);padding:4px 9px;border-radius:6px;transition:.12s;cursor:pointer}
.tb-out:hover{color:var(--rd);background:var(--s3)}

.page{max-width:1280px;margin:0 auto;padding:22px}
.pg-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.pg-title{font-size:1.3rem;font-weight:900}
.add-btn{display:flex;align-items:center;gap:6px;padding:9px 18px;background:var(--g);color:#1C1208;border-radius:8px;font-size:.86rem;font-weight:900;cursor:pointer;border:none;font-family:'Tajawal',sans-serif;transition:.12s}
.add-btn:hover{filter:brightness(1.08)}

.stats3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.stat{background:var(--s2);border:1px solid var(--bd);border-radius:var(--R2);padding:14px 18px;box-shadow:var(--SH)}
.stat-lbl{font-size:.7rem;font-weight:700;color:var(--tx4);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.stat-val{font-size:1.25rem;font-weight:900;font-family:'IBM Plex Mono',monospace;color:var(--tx)}

.layout{display:grid;grid-template-columns:1fr 360px;gap:16px;align-items:start}
.search-bar{display:flex;gap:8px;margin-bottom:12px}
.srch{flex:1;padding:9px 13px;background:var(--s2);border:1px solid var(--bd2);border-radius:8px;color:var(--tx);font-size:.86rem;font-family:'Tajawal',sans-serif;direction:rtl;box-shadow:var(--SH)}
.srch:focus{outline:none;border-color:var(--g)}

.sup-list{background:var(--s2);border:1px solid var(--bd);border-radius:var(--R2);overflow:hidden;box-shadow:var(--SH)}
.sup-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--bd);cursor:pointer;transition:.12s}
.sup-row:last-child{border-bottom:none}
.sup-row:hover{background:var(--s3)}
.sup-row.sel{background:var(--gl);border-right:3px solid var(--g)}
.sup-av{width:42px;height:42px;border-radius:10px;background:var(--s4);display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;color:var(--gd);flex-shrink:0}
.sup-name{font-size:.92rem;font-weight:700}
.sup-meta{font-size:.72rem;color:var(--tx4);margin-top:2px}
.sup-right{margin-right:auto;text-align:left}
.sup-total{font-family:'IBM Plex Mono',monospace;font-size:.84rem;font-weight:700;color:var(--g)}
.sup-count{font-size:.68rem;color:var(--tx4);margin-top:2px}

.detail{background:var(--s2);border:1px solid var(--bd);border-radius:var(--R2);overflow:hidden;position:sticky;top:74px;box-shadow:var(--SH)}
.dh{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:var(--s1);border-bottom:1px solid var(--bd)}
.dh-title{font-size:.88rem;font-weight:700;color:var(--gd)}
.dh-btns{display:flex;gap:6px}
.d-btn{padding:5px 12px;border-radius:6px;font-size:.76rem;font-weight:700;font-family:'Tajawal',sans-serif;cursor:pointer;border:none;transition:.12s}
.d-edit{background:var(--g);color:#1C1208}.d-edit:hover{filter:brightness(1.08)}
.d-del{background:var(--s3);color:var(--rd);border:1px solid rgba(192,57,43,.25)}.d-del:hover{background:var(--rdl)}
.db{padding:16px}
.dav{width:60px;height:60px;border-radius:14px;background:var(--s4);display:flex;align-items:center;justify-content:center;font-size:1.6rem;font-weight:700;color:var(--gd);margin:0 auto 10px}
.dname{text-align:center;font-size:1.05rem;font-weight:900;margin-bottom:3px}
.dphone{text-align:center;font-size:.78rem;color:var(--tx4);font-family:'IBM Plex Mono',monospace;margin-bottom:14px}
.kv{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bd);font-size:.83rem}
.kv:last-child{border-bottom:none}
.kv .k{color:var(--tx4)}.kv .v{font-weight:600;text-align:left}

.sec-title{font-size:.72rem;font-weight:700;color:var(--tx4);text-transform:uppercase;letter-spacing:.05em;margin:14px 0 7px}
.prod-mini{border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.pm-row{display:flex;align-items:center;gap:9px;padding:9px 11px;border-bottom:1px solid var(--bd);font-size:.8rem;cursor:pointer;transition:.1s}
.pm-row:last-child{border-bottom:none}
.pm-row:hover{background:var(--s3)}
.pm-img{width:32px;height:32px;border-radius:6px;background:var(--s3);object-fit:contain;flex-shrink:0}
.pm-img-ph{width:32px;height:32px;border-radius:6px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}

.overlay{position:fixed;inset:0;background:rgba(20,12,4,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:.2s}
.overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--s2);border:1px solid var(--bd2);border-radius:16px;width:100%;max-width:440px;box-shadow:0 32px 80px rgba(40,25,5,.25);overflow:hidden}
.mh{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--s1);border-bottom:1px solid var(--bd)}
.mh-title{font-size:.9rem;font-weight:700;color:var(--gd)}
.mh-close{width:28px;height:28px;border-radius:6px;background:var(--s3);color:var(--tx3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.12s}
.mh-close:hover{background:var(--s4);color:var(--tx2)}
.mb{padding:20px}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:11px}
.fg label{font-size:.72rem;font-weight:700;color:var(--tx4);text-transform:uppercase;letter-spacing:.04em}
.fg input,.fg textarea{padding:9px 11px;background:var(--s3);border:1.5px solid var(--bd);border-radius:8px;color:var(--tx);font-size:.88rem;font-family:'Tajawal',sans-serif;transition:.15s;width:100%}
.fg input:focus,.fg textarea:focus{outline:none;border-color:var(--g)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-save{width:100%;padding:11px;background:var(--g);color:#1C1208;border-radius:9px;font-size:.92rem;font-weight:900;font-family:'Tajawal',sans-serif;cursor:pointer;border:none;transition:.15s;margin-top:8px}
.modal-save:hover{filter:brightness(1.08)}
.modal-del{width:100%;padding:9px;background:none;color:var(--rd);border:1px solid rgba(192,57,43,.35);border-radius:8px;font-size:.84rem;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif;transition:.15s;margin-top:6px}
.modal-del:hover{background:var(--rdl)}
.empty-list{padding:40px;text-align:center;color:var(--tx4);font-size:.86rem}
.empty-detail{display:flex;flex-direction:column;align-items:center;gap:8px;padding:40px 16px;text-align:center;color:var(--tx4)}

@media(max-width:900px){.layout{grid-template-columns:1fr}.stats3{grid-template-columns:1fr 1fr}.tb-nav{display:none}.page{padding:12px}}
</style>
</head>
<body>
<header class="topbar">
  <div class="tb-brand">
    <div class="tb-logo" id="tbLogo">🕌</div>
    <span class="tb-name" id="tbName">طيب الحي</span>
  </div>
  <nav class="tb-nav">
    <a href="dashboard.html" class="tb-link">الرئيسية</a>
    <a href="cashier.html"   class="tb-link">الكاشير</a>
    <a href="inventory.html" class="tb-link">المخزون</a>
    <a href="suppliers.html" class="tb-link on">الموردون</a>
    <a href="reports.html"   class="tb-link">التقارير</a>
    <a href="customers.html" class="tb-link">العملاء</a>
    <a href="users.html"     class="tb-link">الموظفون</a>
  </nav>
  <div style="display:flex;align-items:center;gap:8px">
    <span class="tb-user" id="tbUser">—</span>
    <button class="tb-out" onclick="logout()">خروج</button>
  </div>
</header>

<main class="page">
  <div class="pg-hd">
    <h1 class="pg-title">🏭 الموردون</h1>
    <button class="add-btn" onclick="openModal()">+ مورد جديد</button>
  </div>

  <div class="stats3">
    <div class="stat"><div class="stat-lbl">إجمالي الموردين</div><div class="stat-val" id="st1">0</div></div>
    <div class="stat"><div class="stat-lbl">إجمالي المشتريات منهم</div><div class="stat-val" id="st2">0</div></div>
    <div class="stat"><div class="stat-lbl">عدد المنتجات المرتبطة</div><div class="stat-val" id="st3">0</div></div>
  </div>

  <div class="layout">
    <div>
      <div class="search-bar">
        <input class="srch" id="srch" placeholder="ابحث باسم المورد أو الهاتف…" oninput="renderList()">
      </div>
      <div class="sup-list" id="supList"></div>
    </div>
    <div class="detail" id="detailPanel">
      <div class="dh"><span class="dh-title">بيانات المورد</span></div>
      <div id="detailBody">
        <div class="empty-detail">
          <div style="font-size:2.5rem;opacity:.2">🏭</div>
          <div style="font-size:.86rem">اختر مورداً لعرض تفاصيله</div>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- MODAL -->
<div class="overlay" id="modal">
  <div class="modal">
    <div class="mh">
      <span class="mh-title" id="mTitle">إضافة مورد جديد</span>
      <button class="mh-close" onclick="closeModal()">✕</button>
    </div>
    <div class="mb">
      <div class="grid2">
        <div class="fg"><label>اسم المورد *</label><input id="m_name" placeholder="اسم الشركة أو المورد"></div>
        <div class="fg"><label>الهاتف</label><input id="m_phone" placeholder="05xxxxxxxx" dir="ltr"></div>
      </div>
      <div class="fg"><label>الشخص المسؤول</label><input id="m_contact" placeholder="اسم المندوب"></div>
      <div class="fg"><label>البريد الإلكتروني</label><input id="m_email" placeholder="email@example.com" dir="ltr"></div>
      <div class="fg"><label>العنوان</label><input id="m_addr" placeholder="المنطقة، المدينة، الدولة"></div>
      <div class="fg"><label>ملاحظات</label><textarea id="m_notes" rows="2" placeholder="شروط الدفع، ملاحظات…"></textarea></div>
      <button class="modal-save" onclick="saveSupplier()">حفظ المورد</button>
      <button class="modal-del" id="mDel" onclick="deleteSupplier()" style="display:none">حذف المورد</button>
    </div>
  </div>
</div>

<script src="sync.js"></script>
<script>
DB.enforcePageAccess();
DB.requirePerm('inventory_view');
DB.applyNavPermissions();
const me = DB.session();
document.getElementById('tbUser').textContent = me?.name || '—';
(function(){
  const s = DB.settings();
  document.getElementById('tbName').textContent = s.store_name || 'طيب الحي للعود والأدهان';
  if(s.logo){
    const el=document.getElementById('tbLogo');
    el.innerHTML=`<img src="${s.logo}" style="width:100%;height:100%;object-fit:cover">`;
  }
})();
function logout(){ DB._set(DB.K.session, null); location.href = 'index.html'; }

// Suppliers stored separately, but linked to products/invoices via name match
const SUP_KEY = 'th_suppliers';
function getSuppliers(){ return JSON.parse(localStorage.getItem(SUP_KEY)) || []; }
function saveSuppliers(list){ localStorage.setItem(SUP_KEY, JSON.stringify(list)); }

let selectedId = null, editingId = null;

// Find products & purchase invoices linked to a supplier by name
function supplierStats(name){
  const products = DB.products().filter(p => (p.supplier||'').trim() === name.trim());
  const invoices = DB.invoices().filter(i => i.type==='purchase' && (i.supplier||'').trim() === name.trim());
  const total = invoices.reduce((a,i)=>a+Number(i.total||0),0);
  return { products, invoices, total };
}

function renderStats(){
  const s = DB.settings(); const cur = s.currency || 'د.إ';
  const sups = getSuppliers();
  let totalSpent = 0, totalProducts = 0;
  sups.forEach(sp=>{
    const st = supplierStats(sp.name);
    totalSpent += st.total;
    totalProducts += st.products.length;
  });
  document.getElementById('st1').textContent = sups.length;
  document.getElementById('st2').textContent = DB.fmt(totalSpent) + ' ' + cur;
  document.getElementById('st3').textContent = totalProducts;
}

function renderList(){
  const el = document.getElementById('supList');
  const srch = document.getElementById('srch').value.toLowerCase();
  let list = getSuppliers();
  if(srch) list = list.filter(s => (s.name||'').toLowerCase().includes(srch) || (s.phone||'').includes(srch));
  list.sort((a,b)=>(a.name||'').localeCompare(b.name||''));

  if(!list.length){
    el.innerHTML = `<div class="empty-list">${srch ? 'لا نتائج' : 'لا موردون مسجّلون — أضف أول مورد'}</div>`;
    return;
  }
  const cur = DB.settings().currency || 'د.إ';
  el.innerHTML = list.map(s=>{
    const st = supplierStats(s.name);
    return `<div class="sup-row ${s.id===selectedId?'sel':''}" onclick="selectSupplier('${s.id}')">
      <div class="sup-av">${(s.name||'م')[0]}</div>
      <div>
        <div class="sup-name">${s.name}</div>
        <div class="sup-meta">${s.phone || '—'}</div>
      </div>
      <div class="sup-right">
        <div class="sup-total">${DB.fmt(st.total)} ${cur}</div>
        <div class="sup-count">${st.products.length} منتج · ${st.invoices.length} فاتورة</div>
      </div>
    </div>`;
  }).join('');
}

function selectSupplier(id){
  selectedId = id;
  const s = getSuppliers().find(x=>x.id===id); if(!s) return;
  const cur = DB.settings().currency || 'د.إ';
  const st  = supplierStats(s.name);

  document.getElementById('detailPanel').querySelector('.dh').innerHTML = `
    <span class="dh-title">${s.name}</span>
    <div class="dh-btns">
      <button class="d-btn d-edit" onclick="openModal('${id}')">✏ تعديل</button>
      <button class="d-btn d-del" onclick="deleteById('${id}')">حذف</button>
    </div>`;

  document.getElementById('detailBody').innerHTML = `
    <div class="db">
      <div class="dav">${(s.name||'م')[0]}</div>
      <div class="dname">${s.name}</div>
      <div class="dphone">${s.phone || 'لا هاتف'}</div>
      <div class="kv"><span class="k">الشخص المسؤول</span><span class="v">${s.contact||'—'}</span></div>
      <div class="kv"><span class="k">البريد</span><span class="v">${s.email||'—'}</span></div>
      <div class="kv"><span class="k">العنوان</span><span class="v">${s.address||'—'}</span></div>
      <div class="kv"><span class="k">مورد منذ</span><span class="v">${DB.fmtDate(s.created_at,{year:'numeric',month:'short',day:'numeric'})}</span></div>
      <div class="kv"><span class="k">إجمالي المشتريات</span><span class="v" style="color:var(--g);font-family:'IBM Plex Mono',monospace">${DB.fmt(st.total)} ${cur}</span></div>
      ${s.notes ? `<div style="margin-top:10px;padding:10px 12px;background:var(--s3);border-radius:8px;font-size:.8rem;color:var(--tx3);line-height:1.6">${s.notes}</div>` : ''}
      ${st.products.length ? `
        <div class="sec-title">المنتجات المرتبطة (${st.products.length})</div>
        <div class="prod-mini">
          ${st.products.slice(0,8).map(p=>`
            <div class="pm-row" onclick="location.href='inventory.html'">
              ${p.img?`<img class="pm-img" src="${p.img}">`:`<div class="pm-img-ph">📦</div>`}
              <div style="flex:1">
                <div style="font-weight:600">${p.name}</div>
                <div style="color:var(--tx4);font-size:.7rem">${p.qty||0} ${p.unit||'وحدة'}</div>
              </div>
              <div class="mono" style="font-weight:700;color:var(--g)">${DB.fmt(p.cost)} ${cur}</div>
            </div>`).join('')}
        </div>` : `<div class="sec-title">المنتجات المرتبطة</div><div style="font-size:.78rem;color:var(--tx4);padding:8px 0">لا منتجات مرتبطة بهذا المورد حتى الآن — تُربط تلقائياً عند إدخال اسم المورد في استلام البضاعة بالكاشير</div>`}
      ${st.invoices.length ? `
        <div class="sec-title">آخر فواتير الشراء</div>
        <div class="prod-mini">
          ${st.invoices.slice(0,5).map(i=>`
            <div class="pm-row">
              <div class="pm-img-ph">🧾</div>
              <div style="flex:1">
                <div style="font-weight:600;font-family:'IBM Plex Mono',monospace;font-size:.78rem">${i.supplier_invoice||('#'+String(i.id).slice(-5))}</div>
                <div style="color:var(--tx4);font-size:.7rem">${DB.fmtDate(i.at,{month:'short',day:'numeric'})}</div>
              </div>
              <div class="mono" style="font-weight:700;color:var(--g)">${DB.fmt(i.total)} ${cur}</div>
            </div>`).join('')}
        </div>` : ''}
    </div>`;

  renderList();
}

function openModal(id=null){
  editingId = id;
  const s = id ? getSuppliers().find(x=>x.id===id) : null;
  document.getElementById('mTitle').textContent = s ? 'تعديل: '+s.name : 'إضافة مورد جديد';
  document.getElementById('m_name').value    = s?.name || '';
  document.getElementById('m_phone').value   = s?.phone || '';
  document.getElementById('m_contact').value = s?.contact || '';
  document.getElementById('m_email').value   = s?.email || '';
  document.getElementById('m_addr').value    = s?.address || '';
  document.getElementById('m_notes').value   = s?.notes || '';
  document.getElementById('mDel').style.display = s ? 'block' : 'none';
  document.getElementById('modal').classList.add('show');
}
function closeModal(){ document.getElementById('modal').classList.remove('show'); editingId=null; }

function saveSupplier(){
  const name = document.getElementById('m_name').value.trim();
  if(!name){ toast('أدخل اسم المورد','err'); return; }
  const list = getSuppliers();
  const sup = {
    id: editingId || ('SUP'+Date.now()),
    name,
    phone:   document.getElementById('m_phone').value.trim(),
    contact: document.getElementById('m_contact').value.trim(),
    email:   document.getElementById('m_email').value.trim(),
    address: document.getElementById('m_addr').value.trim(),
    notes:   document.getElementById('m_notes').value.trim(),
    created_at: editingId ? (list.find(x=>x.id===editingId)?.created_at || Date.now()) : Date.now(),
  };
  const idx = list.findIndex(x=>x.id===sup.id);
  if(idx>=0) list[idx]=sup; else list.push(sup);
  saveSuppliers(list);
  closeModal(); renderStats(); renderList();
  toast(editingId ? 'تم التحديث ✓' : 'تم إضافة المورد ✓');
  if(!editingId) selectSupplier(sup.id);
}

function deleteSupplier(){ if(editingId) deleteById(editingId, true); }
function deleteById(id, fromModal=false){
  if(!confirm('حذف هذا المورد نهائياً؟ (لن تُحذف المنتجات أو الفواتير المرتبطة)')) return;
  saveSuppliers(getSuppliers().filter(s=>s.id!==id));
  if(fromModal) closeModal();
  if(selectedId===id){
    selectedId=null;
    document.getElementById('detailPanel').querySelector('.dh').innerHTML = `<span class="dh-title">بيانات المورد</span>`;
    document.getElementById('detailBody').innerHTML = `<div class="empty-detail"><div style="font-size:2.5rem;opacity:.2">🏭</div><div style="font-size:.86rem">اختر مورداً لعرض تفاصيله</div></div>`;
  }
  renderStats(); renderList();

}
