<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>طيب الحي | نظام إدارة العود والأدهان</title>
  <!-- Google Fonts: خط عربي أنيق (Cairo) -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: #fef9ef;
      color: #3e2c1f;
      line-height: 1.4;
      min-height: 100vh;
    }

    /* خلفية رئيسية فاخرة: أعمدة ونقوش إسلامية خفيفة + نخيل ضبابية */
    .luxury-bg {
      position: fixed;
      top: 0;
      right: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: linear-gradient(135deg, #fef5e7 0%, #f9efdf 100%);
    }

    /* نقش إسلامي خفيف */
    .islamic-pattern {
      position: fixed;
      top: 0;
      right: 0;
      width: 100%;
      height: 100%;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" opacity="0.08"><path fill="none" stroke="%23c9a96b" stroke-width="1.2" d="M400,100 L450,200 L550,220 L490,310 L510,420 L400,370 L290,420 L310,310 L250,220 L350,200 Z M400,200 L430,260 L510,280 L460,340 L475,410 L400,380 L325,410 L340,340 L290,280 L370,260 Z M400,440 L440,500 L520,520 L470,580 L485,660 L400,620 L315,660 L330,580 L280,520 L360,500 Z"/><circle cx="400" cy="160" r="20" stroke="%23c9a96b" fill="none"/><circle cx="400" cy="500" r="25" stroke="%23c9a96b" fill="none"/><path d="M200,200 L220,180 L250,210 L230,230 Z M600,600 L620,580 L650,610 L630,630 Z" fill="%23c9a96b" opacity="0.5"/></svg>');
      background-repeat: repeat;
      background-size: 180px;
      pointer-events: none;
      z-index: -1;
    }

    /* تأثير النخيل الضبابي */
    .palm-mist {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60%;
      background: radial-gradient(ellipse at bottom, rgba(210, 180, 140, 0.12) 0%, rgba(250, 240, 220, 0) 70%);
      pointer-events: none;
      z-index: -1;
    }

    /* حاوية رئيسية */
    .main-container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 2rem 2rem 1rem 2rem;
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* Header section */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .btn-icon {
      background: rgba(255, 250, 240, 0.85);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(201, 169, 107, 0.5);
      padding: 0.6rem 1.5rem;
      border-radius: 60px;
      font-family: 'Cairo', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      color: #7a5a3a;
      transition: all 0.25s ease;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    }

    .btn-icon i {
      font-size: 1rem;
      color: #c9a96b;
    }

    .btn-icon:hover {
      background: #fff7ef;
      border-color: #c9a96b;
      color: #9b7a4a;
      transform: translateY(-2px);
      box-shadow: 0 10px 18px -8px rgba(0,0,0,0.08);
    }

    /* القسم المركزي */
    .hero-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem 1rem 3rem;
    }

    /* شعار دائري ذهبي */
    .logo-circle {
      width: 140px;
      height: 140px;
      background: linear-gradient(145deg, #f9e5c1, #fcf3e2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.8rem;
      box-shadow: 0 20px 35px -12px rgba(110, 70, 20, 0.2), inset 0 1px 2px rgba(255,255,200,0.8), 0 0 0 4px rgba(201,169,107,0.25);
      border: 1px solid #e9cf9b;
    }

    .logo-inner {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #c7a05b, #e7c282, #b88644);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 2px;
    }

    .main-title {
      font-size: 5.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(125deg, #3e2c1f, #8b6946, #ba9a6c);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.2rem;
    }

    .sub-title {
      font-size: 2.2rem;
      font-weight: 500;
      color: #aa8b60;
      letter-spacing: 1px;
      margin-bottom: 1.2rem;
      border-bottom: 2px solid rgba(201, 169, 107, 0.3);
      display: inline-block;
      padding-bottom: 5px;
    }

    .description {
      max-width: 620px;
      font-size: 1.18rem;
      color: #5c4731;
      font-weight: 450;
      background: rgba(255, 248, 235, 0.6);
      backdrop-filter: blur(3px);
      padding: 0.8rem 1.8rem;
      border-radius: 60px;
      margin: 1.2rem 0 2.2rem;
      line-height: 1.6;
      border: 1px solid rgba(221, 190, 120, 0.4);
    }

    /* الزر الرئيسي */
    .btn-primary {
      background: linear-gradient(105deg, #c9a96b, #e5c792);
      border: none;
      padding: 1rem 3rem;
      border-radius: 60px;
      font-size: 1.4rem;
      font-weight: 700;
      font-family: 'Cairo', sans-serif;
      color: #2e241b;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 12px 20px -12px rgba(100, 65, 20, 0.3);
      display: inline-flex;
      align-items: center;
      gap: 12px;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255, 245, 210, 0.7);
    }

    .btn-primary i {
      font-size: 1.3rem;
      color: #3e2c1f;
    }

    .btn-primary:hover {
      transform: scale(1.02);
      background: linear-gradient(105deg, #dbb86a, #efd498);
      box-shadow: 0 20px 28px -12px #8b6946;
    }

    /* القسم السفلي: الصورة الفاخرة الحقيقية (مبخرة، عود، دهن، زعفران) */
    .showcase-image {
      margin: 1rem 0 1rem;
      border-radius: 42px;
      overflow: hidden;
      box-shadow: 0 25px 40px -15px rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(230, 200, 130, 0.5);
      background: #fffaf0;
      transition: all 0.3s;
    }

    .showcase-image img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .showcase-image:hover img {
      transform: scale(1.01);
    }

    /* قسم التواصل */
    .contact-section {
      margin-top: 2rem;
      background: rgba(255, 252, 240, 0.75);
      backdrop-filter: blur(6px);
      border-radius: 48px;
      padding: 1.5rem 2rem;
      border: 1px solid rgba(201, 169, 107, 0.4);
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 1.5rem;
    }

    .contact-info {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      align-items: center;
      justify-content: center;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(250, 242, 225, 0.7);
      padding: 0.4rem 1rem;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #6a4e2c;
      transition: 0.2s;
    }

    .contact-item i {
      color: #c9a96b;
      width: 1.2rem;
      font-size: 1rem;
    }

    .contact-item a {
      text-decoration: none;
      color: #6a4e2c;
      font-weight: 500;
      transition: color 0.2s;
    }

    .contact-item a:hover {
      color: #a67c3b;
    }

    .copyright {
      text-align: center;
      font-size: 0.8rem;
      color: #9b8468;
      margin-top: 0.8rem;
      padding-top: 0.8rem;
      border-top: 1px dashed rgba(201, 169, 107, 0.4);
      width: 100%;
      font-weight: 400;
    }

    /* تنسيق الجوال */
    @media (max-width: 800px) {
      .main-container {
        padding: 1.2rem;
      }
      .main-title {
        font-size: 3.5rem;
      }
      .sub-title {
        font-size: 1.6rem;
      }
      .description {
        font-size: 1rem;
        padding: 0.5rem 1rem;
      }
      .btn-primary {
        font-size: 1.2rem;
        padding: 0.8rem 2rem;
      }
      .logo-circle {
        width: 110px;
        height: 110px;
      }
      .contact-section {
        flex-direction: column;
        text-align: center;
        padding: 1rem;
      }
    }

    @media (max-width: 550px) {
      .main-title {
        font-size: 2.6rem;
      }
      .sub-title {
        font-size: 1.3rem;
      }
      .btn-primary {
        font-size: 1rem;
      }
    }

    /* تأثير دخول أنيق */
    .fade-up {
      animation: fadeUp 0.7s ease-out;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="luxury-bg"></div>
  <div class="islamic-pattern"></div>
  <div class="palm-mist"></div>

  <div class="main-container">
    <!-- الشريط العلوي: إعدادات (يمين) + تسجيل الدخول (يسار) -->
    <div class="top-bar fade-up">
      <div class="btn-settings">
        <button class="btn-icon" id="settingsBtn">
          <i class="fas fa-sliders-h"></i> 
          <span>الإعدادات</span>
        </button>
      </div>
      <div class="btn-auth">
        <button class="btn-icon" id="loginSignupBtn">
          <i class="fas fa-user-circle"></i> 
          <span>تسجيل الدخول / إنشاء حساب</span>
        </button>
      </div>
    </div>

    <!-- المحتوى المركزي -->
    <div class="hero-section fade-up">
      <div class="logo-circle">
        <div class="logo-inner">طيب</div>
      </div>
      <h1 class="main-title">طيب الحي</h1>
      <div class="sub-title">للعـود والأدهـان</div>
      <div class="description">
        نظام متكامل لإدارة العطور والعود والأدهان والمخزون والكاشير والمبيعات من مكان واحد.
      </div>
      <button class="btn-primary" id="enterSystemBtn">
        <i class="fas fa-key"></i> دخول النظام
      </button>
    </div>

    <!-- الصورة الفاخرة الحقيقية (مبخرة، عود طبيعي، دهن عود، زعفران، زجاجات عطور) -->
    <div class="showcase-image fade-up">
      <img 
        src="https://images.pexels.com/photos/5564494/pexels-photo-5564494.jpeg" 
        alt="مبخرة عربية فاخرة، قطع عود طبيعي، دهن عود، زعفران وزجاجات عطور - طيب الحي"
        style="width:100%; display:block; border-radius:42px;"
      >
      <!-- ملاحظة: الصورة من Pexels (ترخيص مجاني للاستخدام التجاري) وتعكس الأجواء الخليجية الفاخرة بدون نصوص أو عروض أسعار -->
    </div>

    <!-- قسم التواصل + حقوق الملكية -->
    <div class="contact-section fade-up">
      <div class="contact-info">
        <div class="contact-item"><i class="fas fa-map-marker-alt"></i> الإمارات العربية المتحدة</div>
        <div class="contact-item"><i class="fas fa-phone-alt"></i> <a href="tel:+971XXXXXXXX">+971 4 123 4567</a></div>
        <div class="contact-item"><i class="fab fa-whatsapp"></i> <a href="https://wa.me/971501234567" target="_blank">واتساب</a></div>
        <div class="contact-item"><i class="fas fa-envelope"></i> <a href="mailto:info@tayebalhay.com">info@tayebalhay.com</a></div>
        <div class="contact-item"><i class="fab fa-instagram"></i> <a href="#">@tayeb_alhay</a></div>
        <div class="contact-item"><i class="fab fa-tiktok"></i> <a href="#">@tayebalhay</a></div>
      </div>
      <div class="copyright">
        جميع الحقوق محفوظة © طيب الحي للعود والأدهان
      </div>
    </div>
  </div>

  <script>
    // روابط الأزرار حسب المطلوب: زر دخول النظام + زر تسجيل الدخول/إنشاء حساب يوجهان إلى صفحة الدخول.
    // زر الإعدادات يمكن تطويره لاحقًا (يظهر رسالة حالياً)
    
    const loginBtn = document.getElementById('loginSignupBtn');
    const enterSystemBtn = document.getElementById('enterSystemBtn');
    const settingsBtn = document.getElementById('settingsBtn');
    
    // رابط صفحة تسجيل الدخول (لنظام الإدارة المتكامل)
    const LOGIN_PAGE_URL = 'login.html';   // غيّره إلى المسار الحقيقي للنظام
    
    function redirectToLogin() {
      window.location.href = LOGIN_PAGE_URL;
    }
    
    if (enterSystemBtn) {
      enterSystemBtn.addEventListener('click', (e) => {
        e.preventDefault();
        redirectToLogin();
      });
    }
    
    if (loginBtn) {
      loginBtn.addEventListener('click', (e) => {
        e.preventDefault();
        redirectToLogin();
      });
    }
    
    if (settingsBtn) {
      settingsBtn.addEventListener('click', (e) => {
        e.preventDefault();
        // يمكن تعديل هذا لاحقاً لفتح صفحة إعدادات النظام الحقيقية
        alert('لوحة الإعدادات: تخصيص النظام، إدارة الصلاحيات، إعدادات المتجر (قريباً).');
      });
    }
    
    // تأثيرات بسيطة
    document.querySelectorAll('.fade-up').forEach((el, index) => {
      el.style.animationDelay = `${index * 0.08}s`;
    });
  </script>
</body>
</html>
