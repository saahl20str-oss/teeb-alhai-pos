<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طيب الحي — لوحة التحكم</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ═══════════════════════════════════════════
     TOKENS
  ═══════════════════════════════════════════ */
  :root {
    --gold:      #C9A84C;
    --gold-dim:  #a8893a;
    --gold-pale: #f0e4c0;
    --dark:      #1C1208;
    --dark-2:    #2e2010;
    --cream:     #F8F3EA;
    --cream-2:   #f0e8d8;
    --text:      #2a1e0e;
    --text-2:    #6b5535;
    --text-3:    #a0896a;
    --border:    #ddd0b8;
    --white:     #ffffff;
    --red:       #c0392b;
    --red-pale:  #fdf0ee;
    --green:     #2e7d5c;
    --green-pale:#eef6f2;
    --radius:    10px;
    --shadow:    0 1px 3px rgba(28,18,8,.08), 0 4px 12px rgba(28,18,8,.06);
  }

  /* ═══════════════════════════════════════════
     RESET & BASE
  ═══════════════════════════════════════════ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; }
  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  a { text-decoration: none; color: inherit; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }

  /* ═══════════════════════════════════════════
     TOPBAR
  ═══════════════════════════════════════════ */
  .topbar {
    background: var(--dark);
    padding: 0 28px;
    height: 58px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid #3a2a14;
  }
  .topbar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .topbar-brand svg { width: 32px; height: 32px; }
  .brand-name {
    font-size: 1rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: .02em;
  }
  .brand-sub {
    font-size: .7rem;
    color: var(--text-3);
    margin-top: -2px;
  }
  .topbar-nav {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .nav-btn {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: .85rem;
    color: #c8b89a;
    transition: background .15s, color .15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .nav-btn:hover { background: #2e2010; color: var(--gold); }
  .nav-btn.active { background: var(--gold); color: var(--dark); font-weight: 600; }
  .topbar-actions {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .user-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #2e2010;
    border-radius: 20px;
    padding: 4px 12px 4px 6px;
  }
  .user-avatar {
    width: 26px; height: 26px;
    background: var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: .75rem;
    font-weight: 700;
    color: var(--dark);
  }
  .user-name { font-size: .8rem; color: #c8b89a; }
  .logout-btn {
    font-size: .8rem;
    color: var(--text-3);
    padding: 4px 10px;
    border-radius: 6px;
    transition: background .15s, color .15s;
  }
  .logout-btn:hover { background: #2e2010; color: #e07070; }

  /* ═══════════════════════════════════════════
     PAGE LAYOUT
  ═══════════════════════════════════════════ */
  .page {
    flex: 1;
    padding: 28px 32px;
    max-width: 1320px;
    width: 100%;
    margin: 0 auto;
  }
  .page-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .page-title { font-size: 1.5rem; font-weight: 700; color: var(--dark); }
  .page-date {
    font-size: .82rem;
    color: var(--text-3);
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ═══════════════════════════════════════════
     STAT CARDS ROW
  ═══════════════════════════════════════════ */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 3px;
    height: 100%;
    background: var(--gold);
    opacity: 0;
    transition: opacity .2s;
  }
  .stat-card:hover::before { opacity: 1; }
  .stat-label {
    font-size: .78rem;
    color: var(--text-3);
    font-weight: 500;
  }
  .stat-value {
    font-size: 1.65rem;
    font-weight: 700;
    color: var(--dark);
    font-family: 'IBM Plex Mono', monospace;
    line-height: 1.1;
  }
  .stat-value .currency {
    font-size: .9rem;
    font-family: 'Tajawal', sans-serif;
    color: var(--text-2);
    margin-right: 3px;
  }
  .stat-footer {
    font-size: .75rem;
    color: var(--text-3);
    margin-top: 2px;
  }
  .stat-footer.up { color: var(--green); }
  .stat-footer.down { color: var(--red); }
  .stat-icon {
    position: absolute;
    top: 18px;
    left: 18px;
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    opacity: .15;
  }

  /* ═══════════════════════════════════════════
     MAIN GRID
  ═══════════════════════════════════════════ */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 20px;
  }
  .panel {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .panel-head {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-title {
    font-size: .92rem;
    font-weight: 700;
    color: var(--dark);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-title-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--gold);
  }
  .panel-link {
    font-size: .78rem;
    color: var(--gold-dim);
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 6px;
    transition: background .15s;
  }
  .panel-link:hover { background: var(--gold-pale); }

  /* ═══════════════════════════════════════════
     INVOICES TABLE
  ═══════════════════════════════════════════ */
  .inv-table { width: 100%; border-collapse: collapse; }
  .inv-table th {
    text-align: right;
    padding: 10px 16px;
    font-size: .75rem;
    font-weight: 600;
    color: var(--text-3);
    background: var(--cream);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .inv-table td {
    padding: 12px 16px;
    font-size: .85rem;
    border-bottom: 1px solid #f0e8d8;
    vertical-align: middle;
  }
  .inv-table tr:last-child td { border-bottom: none; }
  .inv-table tr:hover td { background: var(--cream); }
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: .72rem;
    font-weight: 600;
  }
  .badge-sale { background: var(--green-pale); color: var(--green); }
  .badge-buy  { background: #f0f3ff; color: #4a5ab0; }
  .badge-refund { background: var(--red-pale); color: var(--red); }
  .inv-id {
    font-family: 'IBM Plex Mono', monospace;
    font-size: .78rem;
    color: var(--text-3);
  }

  /* ═══════════════════════════════════════════
     SIDE PANELS
  ═══════════════════════════════════════════ */
  .side-col { display: flex; flex-direction: column; gap: 20px; }

  /* LOW STOCK LIST */
  .stock-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    border-bottom: 1px solid #f0e8d8;
    transition: background .12s;
  }
  .stock-item:last-child { border-bottom: none; }
  .stock-item:hover { background: var(--cream); }
  .stock-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-critical { background: var(--red); }
  .dot-low { background: #e67e22; }
  .dot-ok { background: var(--green); }
  .stock-name {
    flex: 1;
    font-size: .85rem;
    font-weight: 500;
  }
  .stock-qty {
    font-family: 'IBM Plex Mono', monospace;
    font-size: .8rem;
    font-weight: 600;
  }
  .stock-qty.critical { color: var(--red); }
  .stock-qty.low { color: #e67e22; }

  /* QUICK ACTIONS */
  .quick-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 16px;
  }
  .qa-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 18px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--cream);
    font-size: .82rem;
    font-weight: 600;
    color: var(--text-2);
    transition: all .15s;
    cursor: pointer;
  }
  .qa-btn:hover {
    background: var(--gold-pale);
    border-color: var(--gold);
    color: var(--dark);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(201,168,76,.15);
  }
  .qa-btn span { font-size: 1.5rem; }

  /* ═══════════════════════════════════════════
     EMPTY STATES
  ═══════════════════════════════════════════ */
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    text-align: center;
    gap: 12px;
  }
  .empty-icon {
    width: 56px; height: 56px;
    border-radius: 14px;
    background: var(--cream-2);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    color: var(--text-3);
    margin-bottom: 4px;
  }
  .empty-title { font-size: .95rem; font-weight: 700; color: var(--text-2); }
  .empty-desc { font-size: .8rem; color: var(--text-3); max-width: 260px; line-height: 1.6; }
  .empty-cta {
    margin-top: 4px;
    padding: 7px 18px;
    background: var(--gold);
    color: var(--dark);
    border-radius: 7px;
    font-size: .82rem;
    font-weight: 700;
    transition: background .15s;
  }
  .empty-cta:hover { background: var(--gold-dim); }

  /* ═══════════════════════════════════════════
     EXPENSES SUMMARY
  ═══════════════════════════════════════════ */
  .expense-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    border-bottom: 1px solid #f0e8d8;
    font-size: .85rem;
  }
  .expense-row:last-child { border-bottom: none; }
  .expense-cat { color: var(--text-2); }
  .expense-amt {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    color: var(--red);
    font-size: .82rem;
  }

  /* ═══════════════════════════════════════════
     RESPONSIVE
  ═══════════════════════════════════════════ */
  @media (max-width: 1100px) {
    .main-grid { grid-template-columns: 1fr; }
    .side-col { flex-direction: row; flex-wrap: wrap; }
    .side-col .panel { flex: 1 1 300px; }
  }
  @media (max-width: 860px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .page { padding: 20px 16px; }
    .topbar-nav { display: none; }
  }
  @media (max-width: 480px) {
    .stats-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ═══════════════ TOPBAR ═══════════════ -->
<header class="topbar">
  <div class="topbar-brand">
    <!-- Logo SVG inline -->
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="32" height="32" rx="8" fill="#2e2010"/>
      <path d="M16 5C12 5 9 8 9 12c0 3 1.5 5.5 4 7l-1 3h8l-1-3c2.5-1.5 4-4 4-7 0-4-3-7-7-7z" fill="#C9A84C" opacity=".9"/>
      <rect x="12" y="25" width="8" height="2" rx="1" fill="#C9A84C" opacity=".5"/>
    </svg>
    <div>
      <div class="brand-name">طيب الحي</div>
      <div class="brand-sub">نظام إدارة المتجر</div>
    </div>
  </div>

  <nav class="topbar-nav">
    <a href="dashboard.html" class="nav-btn active">📊 الرئيسية</a>
    <a href="cashier.html" class="nav-btn">💰 الكاشير</a>
    <a href="inventory.html" class="nav-btn">📦 المخزون</a>
    <a href="add_product.html" class="nav-btn">➕ إضافة منتج</a>
  </nav>

  <div class="topbar-actions">
    <div class="user-pill">
      <div class="user-avatar" id="userAvatar">م</div>
      <span class="user-name" id="userName">مدير</span>
    </div>
    <button class="logout-btn" onclick="logout()">خروج</button>
  </div>
</header>

<!-- ═══════════════ PAGE ═══════════════ -->
<main class="page">
  <div class="page-header">
    <h1 class="page-title">لوحة التحكم</h1>
    <span class="page-date" id="todayDate">—</span>
  </div>

  <!-- STATS ROW -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-icon" style="background:var(--green)">💵</div>
      <div class="stat-label">مبيعات اليوم</div>
      <div class="stat-value" id="todaySales">—<span class="currency">ر.س</span></div>
      <div class="stat-footer" id="todaySalesCount">لا توجد مبيعات اليوم</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:var(--gold)">📦</div>
      <div class="stat-label">قيمة المخزون</div>
      <div class="stat-value" id="inventoryValue">—<span class="currency">ر.س</span></div>
      <div class="stat-footer" id="inventoryCount">لا توجد منتجات</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:#4a5ab0">🛒</div>
      <div class="stat-label">مشتريات الشهر</div>
      <div class="stat-value" id="monthPurchases">—<span class="currency">ر.س</span></div>
      <div class="stat-footer" id="monthPurchasesCount">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:var(--red)">⚠️</div>
      <div class="stat-label">منتجات تحت الحد</div>
      <div class="stat-value" id="lowStockCount" style="color:var(--red)">—</div>
      <div class="stat-footer" id="lowStockLabel">—</div>
    </div>
  </div>

  <!-- MAIN GRID -->
  <div class="main-grid">
    <!-- LEFT: RECENT INVOICES -->
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">
          <div class="panel-title-dot"></div>
          آخر الفواتير
        </div>
        <a href="cashier.html" class="panel-link">فتح الكاشير ←</a>
      </div>
      <div id="invoicesContainer">
        <!-- filled by JS -->
      </div>
    </div>

    <!-- RIGHT COL -->
    <div class="side-col">
      <!-- QUICK ACTIONS -->
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">
            <div class="panel-title-dot"></div>
            اختصارات سريعة
          </div>
        </div>
        <div class="quick-actions">
          <button class="qa-btn" onclick="location.href='cashier.html'">
            <span>💰</span>بيع
          </button>
          <button class="qa-btn" onclick="location.href='cashier.html?mode=buy'">
            <span>🛒</span>شراء
          </button>
          <button class="qa-btn" onclick="location.href='add_product.html'">
            <span>➕</span>منتج جديد
          </button>
          <button class="qa-btn" onclick="location.href='inventory.html'">
            <span>📦</span>المخزون
          </button>
        </div>
      </div>

      <!-- LOW STOCK -->
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">
            <div class="panel-title-dot" style="background:var(--red)"></div>
            تنبيهات المخزون
          </div>
          <a href="inventory.html" class="panel-link">الكل ←</a>
        </div>
        <div id="lowStockContainer">
          <!-- filled by JS -->
        </div>
      </div>

      <!-- EXPENSES THIS MONTH -->
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">
            <div class="panel-title-dot" style="background:var(--red)"></div>
            مصروفات الشهر
          </div>
        </div>
        <div id="expensesContainer">
          <!-- filled by JS -->
        </div>
      </div>
    </div>
  </div>
</main>

<script>
// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function getData(key) {
  try { return JSON.parse(localStorage.getItem(key)) || []; } catch { return []; }
}
function fmtNum(n) {
  return Number(n || 0).toLocaleString('ar-SA', { maximumFractionDigits: 2 });
}
function isToday(ts) {
  const d = new Date(ts), t = new Date();
  return d.getFullYear() === t.getFullYear() &&
         d.getMonth()    === t.getMonth() &&
         d.getDate()     === t.getDate();
}
function isThisMonth(ts) {
  const d = new Date(ts), t = new Date();
  return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth();
}
function arabicDate(d = new Date()) {
  return d.toLocaleDateString('ar-SA-u-nu-latn', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}

// ═══════════════════════════════════════════
// AUTH CHECK
// ═══════════════════════════════════════════
(function() {
  const user = JSON.parse(localStorage.getItem('oud_user') || 'null');
  if (!user) { location.href = 'index.html'; return; }
  document.getElementById('userName').textContent = user.name || user.username || 'مدير';
  document.getElementById('userAvatar').textContent = (user.name || user.username || 'م')[0];
})();

function logout() {
  localStorage.removeItem('oud_user');
  location.href = 'index.html';
}

// ═══════════════════════════════════════════
// DATE
// ═══════════════════════════════════════════
document.getElementById('todayDate').textContent = arabicDate();

// ═══════════════════════════════════════════
// LOAD DATA
// ═══════════════════════════════════════════
function loadDashboard() {
  const products = getData('tayyib_products');
  const invoices = getData('tayyib_invoices');
  const expenses = getData('tayyib_expenses');
  const settings = getData('tayyib_settings');
  const lowThreshold = (settings[0] && settings[0].lowStockThreshold) || 5;

  // ─── TODAY SALES ─────────────────────────
  const todaySales = invoices.filter(inv => inv.type === 'sale' && isToday(inv.date || inv.created_at));
  const todayTotal = todaySales.reduce((s, inv) => s + Number(inv.total || 0), 0);
  document.getElementById('todaySales').innerHTML = `${fmtNum(todayTotal)}<span class="currency">ر.س</span>`;
  document.getElementById('todaySalesCount').textContent =
    todaySales.length ? `${todaySales.length} فاتورة اليوم` : 'لا توجد مبيعات اليوم';
  document.getElementById('todaySalesCount').className =
    'stat-footer' + (todaySales.length ? '' : '');

  // ─── INVENTORY VALUE ─────────────────────
  const invValue = products.reduce((s, p) => s + (Number(p.cost || p.buy_price || 0) * Number(p.qty || p.quantity || 0)), 0);
  document.getElementById('inventoryValue').innerHTML = `${fmtNum(invValue)}<span class="currency">ر.س</span>`;
  document.getElementById('inventoryCount').textContent =
    products.length ? `${products.length} صنف في المخزون` : 'لا توجد منتجات';

  // ─── MONTH PURCHASES ─────────────────────
  const monthPurch = invoices.filter(inv => inv.type === 'purchase' && isThisMonth(inv.date || inv.created_at));
  const monthPurchTotal = monthPurch.reduce((s, inv) => s + Number(inv.total || 0), 0);
  document.getElementById('monthPurchases').innerHTML = `${fmtNum(monthPurchTotal)}<span class="currency">ر.س</span>`;
  document.getElementById('monthPurchasesCount').textContent =
    monthPurch.length ? `${monthPurch.length} فاتورة هذا الشهر` : 'لا مشتريات هذا الشهر';

  // ─── LOW STOCK COUNT ─────────────────────
  const lowProducts = products.filter(p => Number(p.qty || p.quantity || 0) <= lowThreshold);
  document.getElementById('lowStockCount').textContent = lowProducts.length || '0';
  document.getElementById('lowStockLabel').textContent =
    lowProducts.length ? 'تحتاج إعادة تعبئة' : 'المخزون بخير';
  document.getElementById('lowStockLabel').className =
    'stat-footer' + (lowProducts.length ? ' down' : ' up');

  // ─── INVOICES TABLE ──────────────────────
  renderInvoices(invoices);

  // ─── LOW STOCK LIST ──────────────────────
  renderLowStock(products, lowThreshold);

  // ─── EXPENSES ────────────────────────────
  renderExpenses(expenses);
}

// ═══════════════════════════════════════════
// RENDER INVOICES
// ═══════════════════════════════════════════
function renderInvoices(invoices) {
  const container = document.getElementById('invoicesContainer');
  const recent = [...invoices]
    .sort((a, b) => new Date(b.date || b.created_at) - new Date(a.date || a.created_at))
    .slice(0, 8);

  if (!recent.length) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🧾</div>
        <div class="empty-title">لا توجد فواتير بعد</div>
        <div class="empty-desc">ابدأ أول عملية بيع أو شراء من الكاشير وستظهر هنا تلقائياً</div>
        <a href="cashier.html" class="empty-cta">فتح الكاشير</a>
      </div>`;
    return;
  }

  const typeMap = { sale: 'badge-sale', purchase: 'badge-buy', refund: 'badge-refund' };
  const typeLabel = { sale: 'مبيعة', purchase: 'شراء', refund: 'مرتجع' };

  container.innerHTML = `
    <table class="inv-table">
      <thead>
        <tr>
          <th>رقم الفاتورة</th>
          <th>النوع</th>
          <th>التاريخ</th>
          <th>الأصناف</th>
          <th>الإجمالي</th>
        </tr>
      </thead>
      <tbody>
        ${recent.map(inv => {
          const d = new Date(inv.date || inv.created_at);
          const dateStr = isNaN(d) ? '—' :
            d.toLocaleDateString('ar-SA-u-nu-latn', { month:'short', day:'numeric' }) +
            ' ' + d.toLocaleTimeString('ar-SA-u-nu-latn', { hour:'2-digit', minute:'2-digit' });
          const type = inv.type || 'sale';
          const items = inv.items ? inv.items.length : '—';
          return `
            <tr>
              <td><span class="inv-id">#${String(inv.id || inv.invoice_number || '—').slice(-6)}</span></td>
              <td><span class="badge ${typeMap[type] || 'badge-sale'}">${typeLabel[type] || type}</span></td>
              <td style="color:var(--text-3);font-size:.8rem">${dateStr}</td>
              <td style="color:var(--text-2)">${items}</td>
              <td style="font-family:'IBM Plex Mono',monospace;font-weight:600">${fmtNum(inv.total)} <span style="font-family:'Tajawal';font-size:.75rem;color:var(--text-3)">ر.س</span></td>
            </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

// ═══════════════════════════════════════════
// RENDER LOW STOCK
// ═══════════════════════════════════════════
function renderLowStock(products, threshold) {
  const container = document.getElementById('lowStockContainer');
  const low = products
    .filter(p => Number(p.qty || p.quantity || 0) <= threshold)
    .sort((a, b) => Number(a.qty || a.quantity || 0) - Number(b.qty || b.quantity || 0))
    .slice(0, 7);

  if (!low.length) {
    container.innerHTML = `
      <div class="empty" style="padding:32px 16px">
        <div class="empty-icon" style="background:var(--green-pale);color:var(--green)">✓</div>
        <div class="empty-title">المخزون بخير</div>
        <div class="empty-desc">لا توجد منتجات تحت الحد الأدنى</div>
      </div>`;
    return;
  }

  container.innerHTML = low.map(p => {
    const qty = Number(p.qty || p.quantity || 0);
    const isCritical = qty === 0;
    return `
      <div class="stock-item">
        <div class="stock-dot ${isCritical ? 'dot-critical' : 'dot-low'}"></div>
        <div class="stock-name">${p.name || 'منتج بدون اسم'}</div>
        <div class="stock-qty ${isCritical ? 'critical' : 'low'}">${qty === 0 ? 'نفد' : qty + ' وحدة'}</div>
      </div>`;
  }).join('');
}

// ═══════════════════════════════════════════
// RENDER EXPENSES
// ═══════════════════════════════════════════
function renderExpenses(expenses) {
  const container = document.getElementById('expensesContainer');
  const monthExp = expenses.filter(e => isThisMonth(e.date || e.created_at));

  if (!monthExp.length) {
    container.innerHTML = `
      <div class="empty" style="padding:28px 16px">
        <div class="empty-icon">📒</div>
        <div class="empty-title">لا مصروفات مسجلة</div>
        <div class="empty-desc">لم تُسجَّل أي مصروفات هذا الشهر</div>
      </div>`;
    return;
  }

  // group by category
  const byCategory = {};
  monthExp.forEach(e => {
    const cat = e.category || 'عام';
    byCategory[cat] = (byCategory[cat] || 0) + Number(e.amount || 0);
  });

  const total = Object.values(byCategory).reduce((s, v) => s + v, 0);
  container.innerHTML = Object.entries(byCategory).map(([cat, amt]) => `
    <div class="expense-row">
      <span class="expense-cat">${cat}</span>
      <span class="expense-amt">${fmtNum(amt)} ر.س</span>
    </div>`).join('') +
    `<div class="expense-row" style="border-top:1px solid var(--border);margin-top:4px;font-weight:700">
      <span>الإجمالي</span>
      <span class="expense-amt">${fmtNum(total)} ر.س</span>
    </div>`;
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
loadDashboard();
</script>
</body>
</html>
