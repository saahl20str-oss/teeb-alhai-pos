<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طيب الحي — تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C;
  --gold-light: #E2C97E;
  --gold-dark: #8B6914;
  --brown: #5C3A10;
  --text: #2D1A00;
  --text-m: rgba(45,26,0,0.5);
  --bg: #F8F3EA;
  --white: #FFFFFF;
  --border: #E8D5B0;
  --shadow: 0 8px 40px rgba(92,58,16,0.13);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Tajawal',sans-serif;
  min-height:100vh;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 15% 15%, rgba(201,168,76,0.12) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 85%, rgba(139,105,20,0.08) 0%, transparent 55%);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; position:relative;
}

/* subtle pattern */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 40px,
    rgba(201,168,76,0.025) 40px,
    rgba(201,168,76,0.025) 41px
  );
  pointer-events:none;
}

/* decorative circles */
.deco {
  position:fixed; border-radius:50%; pointer-events:none;
}
.deco-1 {
  width:500px; height:500px; top:-150px; right:-150px;
  border:1px solid rgba(201,168,76,0.08);
}
.deco-2 {
  width:350px; height:350px; bottom:-100px; left:-100px;
  border:1px solid rgba(201,168,76,0.06);
}
.deco-3 {
  width:200px; height:200px; bottom:60px; left:20px;
  border:1px solid rgba(201,168,76,0.04);
}

.wrap {
  position:relative; z-index:10;
  display:flex; flex-direction:column; align-items:center;
  gap:0; animation:fadeUp 0.7s ease both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }

/* ── BRAND ── */
.brand {
  text-align:center; margin-bottom:28px;
  animation:fadeUp 0.7s ease 0.1s both;
}
.logo-ring {
  width:100px; height:100px; border-radius:50%;
  background:var(--white);
  border:2px solid var(--gold);
  box-shadow:
    0 0 0 7px rgba(201,168,76,0.1),
    0 0 0 14px rgba(201,168,76,0.04),
    var(--shadow);
  overflow:hidden;
  margin:0 auto 18px;
  transition:transform 0.3s;
}
.logo-ring:hover { transform:scale(1.04); }
.logo-ring img { width:100%; height:100%; object-fit:cover; }

.brand-name {
  font-size:30px; font-weight:800; color:var(--text);
  letter-spacing:2px; line-height:1;
}
.brand-name span { color:var(--gold-dark); }
.brand-tagline {
  margin-top:6px;
  font-size:11px; color:var(--gold-dark);
  letter-spacing:5px; text-transform:uppercase; opacity:0.8;
}
.brand-divider {
  width:60px; height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:10px auto 0;
  border-radius:2px;
}

/* ── CARD ── */
.card {
  background:var(--white);
  border:1px solid var(--border);
  border-radius:20px;
  padding:36px 40px;
  width:430px; max-width:95vw;
  box-shadow:var(--shadow);
  position:relative; overflow:hidden;
  animation:fadeUp 0.7s ease 0.2s both;
}
.card::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-light), var(--gold));
}

.card-title {
  text-align:center; margin-bottom:24px;
}
.card-title h2 {
  font-size:20px; font-weight:700; color:var(--text);
}
.card-title p {
  font-size:12px; color:var(--text-m); margin-top:4px;
  letter-spacing:2px; text-transform:uppercase;
}

/* ── FORM ── */
.fg { margin-bottom:16px; }
.fg label {
  display:block; font-size:12px; font-weight:700;
  color:var(--brown); margin-bottom:7px;
  letter-spacing:0.5px;
}
.input-wrap { position:relative; }
.input-wrap input {
  width:100%; padding:12px 44px 12px 14px;
  border:1.5px solid var(--border); border-radius:10px;
  background:var(--bg); color:var(--text);
  font-family:'Tajawal',sans-serif; font-size:15px;
  outline:none; direction:rtl; transition:all 0.25s;
}
.input-wrap input:focus {
  border-color:var(--gold);
  background:var(--white);
  box-shadow:0 0 0 3px rgba(201,168,76,0.1);
}
.input-wrap input::placeholder { color:rgba(45,26,0,0.22); }
.input-ico {
  position:absolute; right:14px; top:50%;
  transform:translateY(-50%);
  color:var(--gold-dark); opacity:0.5; font-size:15px;
  pointer-events:none; transition:opacity 0.2s;
}
.input-wrap input:focus ~ .input-ico { opacity:1; }
.toggle-ico {
  position:absolute; left:14px; top:50%;
  transform:translateY(-50%);
  color:var(--gold-dark); opacity:0.4; font-size:15px;
  cursor:pointer; pointer-events:all !important; transition:opacity 0.2s;
}
.toggle-ico:hover { opacity:0.8; }

.err-box {
  background:#FEF3F2; border:1px solid #FECDD3;
  border-radius:8px; padding:10px 14px;
  color:#B91C1C; font-size:13px; text-align:center;
  margin-bottom:14px; display:none;
  animation:shake 0.35s ease;
}
.err-box.show { display:block; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }

.login-btn {
  width:100%; padding:13px;
  background:linear-gradient(135deg, var(--gold-dark) 0%, var(--gold) 50%, var(--gold-light) 100%);
  border:none; border-radius:10px;
  color:var(--white); font-family:'Tajawal',sans-serif;
  font-size:16px; font-weight:700; cursor:pointer;
  transition:all 0.25s; letter-spacing:1px; margin-top:4px;
  position:relative; overflow:hidden;
}
.login-btn::after {
  content:''; position:absolute; inset:0;
  background:rgba(255,255,255,0.15); opacity:0; transition:opacity 0.2s;
}
.login-btn:hover { transform:translateY(-2px); box-shadow:0 6px 22px rgba(139,105,20,0.35); }
.login-btn:hover::after { opacity:1; }
.login-btn:active { transform:translateY(0); }

/* ── DEMO ── */
.demo-section {
  margin-top:20px; padding-top:18px;
  border-top:1px solid var(--border);
  text-align:center;
}
.demo-lbl {
  font-size:10px; color:var(--text-m);
  letter-spacing:3px; text-transform:uppercase; margin-bottom:10px;
}
.demo-chips { display:flex; gap:6px; justify-content:center; }
.demo-chip {
  padding:5px 14px; border:1px solid var(--border);
  border-radius:20px; font-size:12px; color:var(--text-m);
  cursor:pointer; transition:all 0.2s; font-family:'Tajawal',sans-serif;
}
.demo-chip:hover {
  border-color:var(--gold); color:var(--gold-dark);
  background:rgba(201,168,76,0.07);
}

/* ── FOOTER ── */
.page-footer {
  margin-top:20px; text-align:center;
  font-size:11px; color:rgba(92,58,16,0.35);
  animation:fadeUp 0.7s ease 0.3s both;
}
</style>
</head>

    <div class="brand-name">طيب <span>الحي</span></div>
    <div class="brand-tagline">Teeb Al Hai · نظام إدارة المتجر</div>
    <div class="brand-divider"></div>
  </div>

  <!-- CARD -->
  <div class="card">
    <div class="card-title">
      <h2>تسجيل الدخول</h2>
      <p>أدخل بياناتك للوصول إلى النظام</p>
    </div>

    <div class="err-box" id="errBox">
      ⚠️ اسم المستخدم أو كلمة المرور غير صحيحة
    </div>

    <div class="fg">
      <label>اسم المستخدم</label>
      <div class="input-wrap">
        <input type="text" id="uname" placeholder="أدخل اسم المستخدم" autocomplete="off">
        <span class="input-ico">👤</span>
      </div>
    </div>

    <div class="fg">
      <label>كلمة المرور</label>
      <div class="input-wrap">
        <input type="password" id="upass" placeholder="••••••••">
        <span class="input-ico">🔑</span>
        <span class="toggle-ico" id="toggleIco" onclick="togglePwd()">👁️</span>
      </div>
    </div>

    <button class="login-btn" onclick="doLogin()">
      دخول إلى النظام &nbsp;←
    </button>

    <div class="demo-section">
      <div class="demo-lbl">حسابات تجريبية للتجربة</div>
      <div class="demo-chips">
        <div class="demo-chip" onclick="fill('admin','admin123')">مدير النظام</div>
        <div class="demo-chip" onclick="fill('cashier1','1234')">كاشير</div>
        <div class="demo-chip" onclick="fill('stock1','1234')">مخزون</div>
      </div>
    </div>
  </div>

  <div class="page-footer">
    طيب الحي © 2025 — الإمارات العربية المتحدة
  </div>
</div>

<script>
// الحسابات — الصلاحيات تُحدَّد من لوحة التحكم
const ACCOUNTS = {
  admin:    { pass:'admin123', role:'admin',     name:'محمد — مدير النظام' },
  cashier1: { pass:'1234',     role:'cashier',   name:'أحمد الكاشير' },
  stock1:   { pass:'1234',     role:'inventory', name:'سالم المخزون' },
};

function fill(u,p){
  document.getElementById('uname').value=u;
  document.getElementById('upass').value=p;
}

function togglePwd(){
  const inp=document.getElementById('upass');
  const ico=document.getElementById('toggleIco');
  if(inp.type==='password'){ inp.type='text'; ico.textContent='🙈'; }
  else { inp.type='password'; ico.textContent='👁️'; }
}

function doLogin(){
  const u=document.getElementById('uname').value.trim();
  const p=document.getElementById('upass').value.trim();
  const err=document.getElementById('errBox');
  err.classList.remove('show');
  const acc=ACCOUNTS[u];
  if(acc && acc.pass===p){
    localStorage.setItem('oud_user', JSON.stringify({
      username:u, role:acc.role, name:acc.name,
      permissions: getDefaultPerms(acc.role)
    }));
    // المدير → لوحة التحكم ، الكاشير → الكاشير ، غيره → لوحة التحكم
    window.location.href = acc.role==='cashier' ? 'cashier.html' : 'dashboard.html';
  } else {
    err.classList.add('show');
    document.getElementById('upass').value='';
    document.getElementById('upass').focus();
  }
}

function getDefaultPerms(role){
  const all=['dashboard','inventory','cashier','invoices','customers','reports','employees','settings'];
  const map={
    admin:     all,
    cashier:   ['cashier','invoices'],
    inventory: ['inventory','dashboard'],
    viewer:    ['dashboard','reports'],
  };
  return map[role]||[];
}

document.addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
</script>
