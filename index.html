<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>طيب الحي | تسجيل الدخول</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Cairo", sans-serif;
      background:
        linear-gradient(rgba(25, 18, 10, .20), rgba(25, 18, 10, .35)),
        url("./bg-login.jpg") center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2b2118;
      overflow: hidden;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      backdrop-filter: blur(2px);
    }

    .login-wrap {
      width: 100%;
      max-width: 520px;
      text-align: center;
    }

    .brand {
      margin-bottom: 24px;
      color: #2b2118;
      text-shadow: 0 2px 18px rgba(255,255,255,.6);
    }

    .brand img {
      width: 96px;
      height: 96px;
      object-fit: contain;
      border-radius: 50%;
      box-shadow: 0 12px 35px rgba(166, 123, 29, .35);
      margin-bottom: 12px;
      background: rgba(255,255,255,.75);
    }

    .brand h1 {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .brand p {
      font-size: 15px;
      color: #5f4a31;
      font-weight: 600;
      margin-top: -3px;
    }

    .divider {
      width: 160px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c8a44d, transparent);
      margin: 12px auto 0;
      position: relative;
    }

    .divider::after {
      content: "◆";
      position: absolute;
      top: -11px;
      left: 50%;
      transform: translateX(-50%);
      color: #c8a44d;
      background: transparent;
      font-size: 12px;
    }

    .card {
      background: rgba(255, 255, 255, .93);
      border: 1px solid rgba(200, 164, 77, .55);
      border-radius: 28px;
      padding: 42px 42px 34px;
      box-shadow: 0 30px 90px rgba(0,0,0,.22);
      text-align: right;
    }

    .title {
      text-align: center;
      margin-bottom: 30px;
    }

    .title h2 {
      font-size: 28px;
      font-weight: 800;
      color: #2b2118;
    }

    .title p {
      margin-top: 8px;
      color: #8b7d6b;
      font-size: 15px;
      font-weight: 500;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
      color: #3a2a1c;
    }

    .input-box {
      position: relative;
    }

    input, select {
      width: 100%;
      height: 54px;
      border-radius: 12px;
      border: 1px solid #d8c9a8;
      background: #fcfaf5;
      padding: 0 48px 0 16px;
      font-family: inherit;
      font-size: 15px;
      color: #2b2118;
      outline: none;
      transition: .25s ease;
    }

    input:focus, select:focus {
      border-color: #c8a44d;
      box-shadow: 0 0 0 4px rgba(200,164,77,.14);
      background: #fff;
    }

    .icon {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #b38a2e;
      font-size: 18px;
      pointer-events: none;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 6px 0 24px;
      font-size: 14px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #3a2a1c;
      font-weight: 600;
    }

    .remember input {
      width: 17px;
      height: 17px;
      accent-color: #c8a44d;
    }

    .forgot {
      color: #b38a2e;
      text-decoration: none;
      font-weight: 700;
    }

    .btn {
      width: 100%;
      height: 58px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #a87b1d, #d8bc67, #f0d98a);
      color: white;
      font-family: inherit;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(168,123,29,.28);
      transition: .25s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 40px rgba(168,123,29,.35);
    }

    .security {
      margin-top: 24px;
      text-align: center;
      color: #6f5d47;
      font-size: 14px;
      font-weight: 600;
    }

    .status {
      margin: 22px auto 0;
      width: fit-content;
      min-width: 260px;
      padding: 12px 24px;
      border-radius: 999px;
      background: rgba(255,255,255,.72);
      border: 1px solid rgba(200,164,77,.45);
      color: #2b2118;
      font-size: 15px;
      font-weight: 700;
      box-shadow: 0 12px 30px rgba(0,0,0,.12);
      text-align: center;
    }

    .dot {
      display: inline-block;
      width: 11px;
      height: 11px;
      background: #2e8b57;
      border-radius: 50%;
      margin-right: 8px;
      box-shadow: 0 0 0 5px rgba(46,139,87,.13);
    }

    @media (max-width: 600px) {
      body {
        overflow: auto;
      }

      .card {
        padding: 32px 22px 28px;
        border-radius: 22px;
      }

      .brand h1 {
        font-size: 28px;
      }

      .title h2 {
        font-size: 24px;
      }

      .row {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="login-wrap">

      <div class="brand">
        <img src="./logo.png" alt="شعار طيب الحي">
        <h1>طيب الحي</h1>
        <p>للعود والأدهان</p>
        <div class="divider"></div>
      </div>

      <form class="card">
        <div class="title">
          <h2>تسجيل الدخول</h2>
          <p>دخول موظفي طيب الحي لإدارة المبيعات والمخزون</p>
          <div class="divider"></div>
        </div>

        <div class="form-group">
          <label>اختر الفرع</label>
          <div class="input-box">
            <span class="icon">🏬</span>
            <select>
              <option>الفرع الرئيسي</option>
              <option>فرع المول</option>
              <option>فرع السوق</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>اسم المستخدم</label>
          <div class="input-box">
            <span class="icon">👤</span>
            <input type="text" placeholder="أدخل اسم المستخدم">
          </div>
        </div>

        <div class="form-group">
          <label>كلمة المرور</label>
          <div class="input-box">
            <span class="icon">🔒</span>
            <input type="password" placeholder="أدخل كلمة المرور">
          </div>
        </div>

        <div class="row">
          <label class="remember">
            <input type="checkbox">
            تذكرني على هذا الجهاز
          </label>
          <a href="#" class="forgot">نسيت كلمة المرور؟</a>
        </div>

        <button class="btn" type="submit">دخول إلى لوحة النظام ←</button>

        <p class="security">🛡 هذا النظام مخصص للموظفين المصرّح لهم فقط.</p>
      </form>

      <div class="status">
        النظام متصل وجاهز للعمل <span class="dot"></span>
      </div>

    </section>
  </main>
</body>
</html>
