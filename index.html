<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طيب الحي — تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C9A84C;--dark:#1C1208;--dark2:#2e2010;--cream:#F8F3EA;--border:#ddd0b8;--text:#2a1e0e;--text3:#a0896a;--red:#c0392b}
body{font-family:'Tajawal',sans-serif;background:var(--dark);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.wrap{width:100%;max-width:400px}
.logo-area{text-align:center;margin-bottom:36px}
.logo-box{width:72px;height:72px;background:var(--gold);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 14px;box-shadow:0 8px 24px rgba(201,168,76,.3)}
.logo-box img{width:100%;height:100%;object-fit:contain;border-radius:14px}
.store-name{font-size:1.3rem;font-weight:900;color:var(--gold)}
.store-sub{font-size:.78rem;color:#8a7458;margin-top:3px}
.card{background:var(--cream);border-radius:16px;padding:32px 28px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.card-title{font-size:1rem;font-weight:700;color:var(--dark);margin-bottom:22px;text-align:center}
.f-row{margin-bottom:16px}
.f-lbl{display:block;font-size:.8rem;font-weight:600;color:#6b5535;margin-bottom:6px}
.f-inp{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:9px;font-size:.92rem;font-family:'Tajawal',sans-serif;background:#fff;color:var(--text);transition:.2s;direction:ltr;text-align:right}
.f-inp:focus{outline:none;border-color:var(--gold);background:#fffdf7;box-shadow:0 0 0 3px rgba(201,168,76,.12)}
.login-btn{width:100%;padding:13px;background:var(--dark);color:var(--gold);border-radius:9px;font-size:.98rem;font-weight:700;font-family:'Tajawal',sans-serif;cursor:pointer;border:none;transition:.15s;margin-top:6px}
.login-btn:hover{background:var(--dark2)}
.err{color:var(--red);font-size:.8rem;text-align:center;margin-top:10px;min-height:20px}
.hint{text-align:center;font-size:.74rem;color:var(--text3);margin-top:18px;padding-top:16px;border-top:1px solid var(--border)}
.hint strong{color:var(--dark);font-family:'IBM Plex Mono',monospace}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-area">
    <div class="logo-box" id="loginLogo">🕌</div>
    <div class="store-name" id="loginName">طيب الحي</div>
    <div class="store-sub">نظام إدارة المتجر</div>
  </div>
  <div class="card">
    <div class="card-title">تسجيل الدخول</div>
    <div class="f-row">
      <label class="f-lbl">اسم المستخدم</label>
      <input class="f-inp" id="uname" placeholder="username" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="f-row">
      <label class="f-lbl">كلمة المرور</label>
      <input class="f-inp" id="upass" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">دخول</button>
    <div class="err" id="errMsg"></div>
    <div class="hint">الحساب الافتراضي: <strong>admin</strong> / <strong>admin123</strong></div>
  </div>
</div>
<script src="sync.js"></script>
<script>
// Apply logo/name from settings
(function(){
  const s = DB.getSettings();
  if(s.store_name) document.getElementById('loginName').textContent = s.store_name;
  if(s.logo){ document.getElementById('loginLogo').innerHTML=`<img src="${s.logo}">`; }
})();

// Ensure default admin exists
(function seedAdmin(){
  const accounts = DB.getAccounts();
  if(!accounts.find(a => a.username === 'admin')){
    DB.saveAccounts([...accounts, {
      id: 'admin',
      username: 'admin',
      password: 'admin123',
      name: 'مدير النظام',
      role: 'admin',
      permissions: {},
      active: true,
      created_at: Date.now(),
    }]);
  }
})();

function doLogin(){
  const uname = document.getElementById('uname').value.trim();
  const upass = document.getElementById('upass').value;
  const err   = document.getElementById('errMsg');
  err.textContent = '';
  if(!uname||!upass){ err.textContent='أدخل اسم المستخدم وكلمة المرور'; return; }
  const account = DB.getAccount(uname);
  if(!account){ err.textContent='اسم المستخدم غير موجود'; return; }
  if(!account.active){ err.textContent='هذا الحساب موقوف، تواصل مع المدير'; return; }
  if(account.password !== upass){ err.textContent='كلمة المرور غير صحيحة'; return; }
  DB.set(DB.KEYS.user, { id:account.id, username:account.username, name:account.name, role:account.role, permissions:account.permissions||{} });
  location.href = 'dashboard.html';
}
</script>
</body>
</html>
