<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>طيب الحي للعود والأدهان</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --gold-dark: #9a7a30;
      --bg-dark: #0d0a06;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg-dark);
      color: #f5e6c8;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Background ── */
    .bg-image {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: url('https://images.unsplash.com/photo-1547887538-e3a2f32cb1cc?w=1920&q=80');
      background-size: cover;
      background-position: center;
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(80,40,10,0.75) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(60,30,5,0.65) 0%, transparent 50%),
        linear-gradient(135deg, rgba(13,10,6,0.90) 0%, rgba(20,14,8,0.85) 40%, rgba(13,10,6,0.92) 100%);
    }

    .bg-pattern {
      position: fixed;
      inset: 0;
      z-index: 2;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    /* ── Particles ── */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      background: rgba(201,168,76,0.7);
      box-shadow: 0 0 8px rgba(201,168,76,0.8);
      animation: floatUp linear infinite;
      bottom: -20px;
    }

    @keyframes floatUp {
      0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-110vh) translateX(30px) rotate(360deg); opacity: 0; }
    }

    /* ── Bottom band ── */
    .bottom-band {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      z-index: 20;
      background: linear-gradient(90deg, transparent, #c9a84c, #e8c96a, #c9a84c, transparent);
    }

    /* ── Nav ── */
    nav {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 1.25rem 1.5rem;
    }

    /* ── Main ── */
    main {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 80px);
      padding: 2rem 1rem;
      text-align: center;
    }

    /* ── Ornament SVG ── */
    .ornament {
      width: 12rem;
      color: rgba(201,168,76,0.6);
      margin-bottom: 1.5rem;
    }
    .ornament.flip {
      transform: rotate(180deg);
      margin-top: 1rem;
      margin-bottom: 2.5rem;
    }

    /* ── Logo ── */
    .logo-wrap {
      position: relative;
      margin-bottom: 2rem;
    }

    .logo-glow {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(201,168,76,0.2);
      filter: blur(24px);
      transform: scale(1.1);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1.1); opacity: 0.8; }
      50%       { transform: scale(1.25); opacity: 1; }
    }

    .logo-img {
      position: relative;
      width: 11rem;
      height: 11rem;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid rgba(201,168,76,0.6);
      box-shadow:
        0 0 40px rgba(201,168,76,0.4),
        0 0 80px rgba(201,168,76,0.2),
        0 20px 60px rgba(0,0,0,0.6);
    }

    .logo-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .logo-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(201,168,76,0.3);
      transform: scale(1.1);
      animation: ringPulse 2s ease-in-out infinite;
    }

    @keyframes ringPulse {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1; }
    }

    /* ── Shop name ── */
    h1 {
      font-family: 'Amiri', serif;
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 700;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, #c9a84c 0%, #e8c96a 40%, #f5d98a 60%, #c9a84c 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ── Subtitle ── */
    .subtitle {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: rgba(201,168,76,0.7);
      margin-bottom: 0.5rem;
    }

    .subtitle p {
      font-family: 'Amiri', serif;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      font-weight: 300;
    }

    .sparkle {
      width: 1rem;
      height: 1rem;
      fill: currentColor;
    }

    /* ── Tagline ── */
    .tagline {
      color: rgba(245,230,200,0.55);
      font-size: 0.95rem;
      max-width: 28rem;
      line-height: 1.8;
      margin-bottom: 2.5rem;
    }

    /* ── CTA Button ── */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      background: linear-gradient(135deg, #b8860b, #c9a84c, #e8c96a);
      color: #1a0f00;
      font-family: 'Cairo', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 1rem 3rem;
      border-radius: 9999px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      box-shadow:
        0 8px 32px rgba(201,168,76,0.4),
        0 2px 8px rgba(0,0,0,0.4);
      transition: transform 0.25s cubic-bezier(0.23,1,0.32,1), box-shadow 0.25s ease;
    }

    .cta-btn:hover {
      transform: scale(1.05);
      box-shadow:
        0 12px 40px rgba(201,168,76,0.6),
        0 4px 12px rgba(0,0,0,0.4);
    }

    .cta-btn:active {
      transform: scale(0.97);
    }

    .cta-btn svg {
      width: 1.25rem;
      height: 1.25rem;
    }

    /* ── Feature pills ── */
    .features {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem;
      margin-top: 3rem;
    }

    .pill {
      padding: 0.5rem 1.25rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      border: 1px solid rgba(201,168,76,0.3);
      color: rgba(232,201,106,0.85);
      background: rgba(201,168,76,0.08);
      backdrop-filter: blur(8px);
      transition: border-color 0.2s, background 0.2s;
    }

    .pill:hover {
      border-color: rgba(201,168,76,0.6);
      background: rgba(201,168,76,0.15);
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .logo-img { width: 8rem; height: 8rem; }
      .cta-btn { padding: 0.875rem 2rem; font-size: 1rem; }
    }
  </style>
</head>
<body>

  <!-- Background layers -->
  <div class="bg-image"></div>
  <div class="bg-overlay"></div>
  <div class="bg-pattern"></div>

  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <!-- Bottom gold band -->
  <div class="bottom-band"></div>

  <!-- Navigation -->
  <nav>
    <!-- يمكن إضافة روابط هنا لاحقاً -->
  </nav>

  <!-- Main hero -->
  <main>

    <!-- Top ornament -->
    <svg class="ornament" viewBox="0 0 200 40" fill="currentColor">
      <path d="M100 5 L110 20 L100 35 L90 20 Z" opacity="0.6"/>
      <path d="M80 20 Q90 5 100 20 Q110 5 120 20" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.8"/>
      <circle cx="100" cy="20" r="3" opacity="0.9"/>
      <circle cx="70" cy="20" r="2" opacity="0.6"/>
      <circle cx="130" cy="20" r="2" opacity="0.6"/>
      <line x1="10" y1="20" x2="65" y2="20" stroke="currentColor" stroke-width="1" opacity="0.5"/>
      <line x1="135" y1="20" x2="190" y2="20" stroke="currentColor" stroke-width="1" opacity="0.5"/>
      <path d="M20 20 L25 15 L30 20 L25 25 Z" opacity="0.4"/>
      <path d="M170 20 L175 15 L180 20 L175 25 Z" opacity="0.4"/>
    </svg>

    <!-- Logo -->
    <div class="logo-wrap">
      <div class="logo-glow"></div>
      <div class="logo-img">
        <img
          src="https://teebhai-2rzg6dt6.manus.space/manus-storage/teeb-logo_ab292981.jpeg"
          alt="شعار طيب الحي"
          onerror="this.src='https://via.placeholder.com/176x176/1a0f00/c9a84c?text=TH'"
        />
      </div>
      <div class="logo-ring"></div>
    </div>

    <!-- Shop name -->
    <h1>طيب الحي</h1>

    <!-- Subtitle -->
    <div class="subtitle">
      <svg class="sparkle" viewBox="0 0 24 24"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>
      <p>Teeb Al Hai — Oud &amp; Perfumes</p>
      <svg class="sparkle" viewBox="0 0 24 24"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>
    </div>

    <!-- Bottom ornament -->
    <svg class="ornament flip" viewBox="0 0 200 40" fill="currentColor">
      <path d="M100 5 L110 20 L100 35 L90 20 Z" opacity="0.6"/>
      <path d="M80 20 Q90 5 100 20 Q110 5 120 20" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.8"/>
      <circle cx="100" cy="20" r="3" opacity="0.9"/>
      <circle cx="70" cy="20" r="2" opacity="0.6"/>
      <circle cx="130" cy="20" r="2" opacity="0.6"/>
      <line x1="10" y1="20" x2="65" y2="20" stroke="currentColor" stroke-width="1" opacity="0.5"/>
      <line x1="135" y1="20" x2="190" y2="20" stroke="currentColor" stroke-width="1" opacity="0.5"/>
      <path d="M20 20 L25 15 L30 20 L25 25 Z" opacity="0.4"/>
      <path d="M170 20 L175 15 L180 20 L175 25 Z" opacity="0.4"/>
    </svg>

    <!-- Tagline -->
    <p class="tagline">
      نظام إدارة متكامل للعطور والعود والأدهان — كاشير ذكي، مخزون دقيق، وتقارير فورية
    </p>

    <!-- CTA Button -->
    <a class="cta-btn" href="https://teebhai-2rzg6dt6.manus.space/login">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      دخول النظام
    </a>

    <!-- Feature pills -->
    <div class="features">
      <span class="pill">🔥 إدارة المخزون</span>
      <span class="pill">🧾 فواتير مرقمة</span>
      <span class="pill">📊 إحصائيات دقيقة</span>
      <span class="pill">🤖 مستشار ذكي</span>
      <span class="pill">⚡ كاشير سريع</span>
    </div>

  </main>

  <script>
    // Generate saffron particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 25; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = 3 + Math.random() * 5;
      p.style.cssText = `
        left: ${Math.random() * 100}%;
        width: ${size}px;
        height: ${size * 0.3}px;
        animation-delay: ${Math.random() * 8}s;
        animation-duration: ${6 + Math.random() * 8}s;
        opacity: 0;
      `;
      container.appendChild(p);
    }
  </script>

</body>
</html>
