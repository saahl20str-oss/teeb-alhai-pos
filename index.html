/* LAYOUT */
.wrap{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}

/* BRAND ABOVE CARD */
.brand{text-align:center;margin-bottom:22px}
.brand-name{font-size:1.3rem;font-weight:900;color:#C9A84C;letter-spacing:.03em;text-shadow:0 2px 10px rgba(0,0,0,.5)}
.brand-sub{font-size:.74rem;color:rgba(200,176,154,.5);margin-top:4px;letter-spacing:.05em}

/* LOGO */
.logo-ring{
  width:82px;height:82px;border-radius:50%;
  overflow:hidden;margin:0 auto 14px;
  border:2.5px solid rgba(201,168,76,.5);
  box-shadow:0 0 0 4px rgba(201,168,76,.08),0 8px 28px rgba(0,0,0,.5);
  background:#fff;
}
.logo-ring img{width:100%;height:100%;object-fit:cover;display:block}

/* CARD — WHITE */
.card{
  position:relative;
  width:100%;max-width:390px;
  background:#ffffff;
  border-radius:20px;
  padding:32px 30px 26px;
  box-shadow:0 24px 64px rgba(0,0,0,.55);
}
/* gold top accent line */
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,#C9A84C,transparent);
  border-radius:20px 20px 0 0;
}

/* TABS */
.tabs{display:flex;background:#f4f0ea;border-radius:10px;padding:4px;gap:4px;margin-bottom:24px}
.tab-btn{
  flex:1;padding:8px;border:none;background:none;
  font-family:'Tajawal',sans-serif;font-size:.86rem;font-weight:700;
  color:#8a7458;border-radius:7px;cursor:pointer;transition:.15s;
}
.tab-btn.on{background:#fff;color:#1C1208;box-shadow:0 1px 4px rgba(0,0,0,.12)}

/* FORM */
.form{display:none}.form.on{display:block}
.field{margin-bottom:16px}
.field label{
  display:block;font-size:.72rem;font-weight:700;
  color:#8a7458;margin-bottom:6px;
  letter-spacing:.05em;text-transform:uppercase;
}
.field input{
  width:100%;padding:11px 14px;
  background:#faf8f5;
  border:1.5px solid #e0d5c4;
  border-radius:9px;
  font-size:.93rem;font-family:'Tajawal',sans-serif;
  color:#1C1208;direction:ltr;text-align:right;transition:.2s;
}
.field input:focus{
  outline:none;border-color:#C9A84C;
  background:#fffdf8;
  box-shadow:0 0 0 3px rgba(201,168,76,.12);
}
.field input::placeholder{color:#bfb09a}

/* BUTTON */
.btn{
  width:100%;padding:13px;
  background:linear-gradient(135deg,#C9A84C,#a8893a);
  color:#1C1208;border:none;border-radius:10px;
  font-size:.97rem;font-weight:900;font-family:'Tajawal',sans-serif;
  cursor:pointer;transition:.15s;letter-spacing:.03em;
  box-shadow:0 4px 16px rgba(201,168,76,.35);
  margin-top:4px;
}
.btn:hover{filter:brightness(1.08);box-shadow:0 6px 22px rgba(201,168,76,.45)}
.btn:active{transform:scale(.99)}

/* MESSAGES */
.msg{font-size:.8rem;text-align:center;min-height:22px;margin-top:10px;border-radius:7px;padding:0}
.msg.err{color:#c0392b}
.msg.ok{color:#2e7d5c}

/* DIVIDER */
.divider{border:none;border-top:1px solid #ede6d8;margin:18px 0}

/* PASSWORD STRENGTH */
.pw-strength{height:4px;border-radius:2px;background:#ede6d8;margin-top:6px;overflow:hidden}
.pw-bar{height:100%;width:0;border-radius:2px;transition:.3s;background:#C9A84C}

/* SHOW/HIDE pass toggle */
.pw-wrap{position:relative}
.pw-toggle{
  position:absolute;top:50%;left:12px;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:#bfb09a;font-size:.85rem;
  transition:.15s;padding:2px;
}
.pw-toggle:hover{color:#8a7458}
</style>
</head>

<div class="bg"></div>

<div class="wrap">
  <div style="width:100%;max-width:390px">

    <!-- BRAND -->

    <div class="card">

      <!-- TABS -->
      <div class="tabs">
        <button class="tab-btn on" id="tab-login"    onclick="switchTab('login')">تسجيل الدخول</button>

      <!-- LOGIN FORM -->
      <div class="form on" id="form-login">
        <div class="field">
          <label>اسم المستخدم</label>

        </div>
        <div class="field">
          <label>كلمة المرور</label>
          <div class="pw-wrap">
            <input id="l_pass" type="password" placeholder="••••••••"
              autocomplete="current-password" onkeydown="if(event.key==='Enter')login()"
              style="padding-left:38px">
            <button class="pw-toggle" onclick="togglePw('l_pass',this)" type="button">👁</button>
          </div>
        </div>
        <button class="btn" onclick="login()">دخول</button>
        <div class="msg err" id="l_err"></div>
        <div style="margin-top:14px;text-align:center">
          <button onclick="resetAndLogin()" style="font-size:.7rem;color:#c8b89a;background:none;border:none;cursor:pointer;font-family:'Tajawal',sans-serif;padding:4px 8px;border-radius:5px;transition:.15s" onmouseover="this.style.color='#C9A84C'" onmouseout="this.style.color='#c8b89a'">
            إعادة تعيين حساب المدير
          </button>
        </div>
      </div>

      <!-- REGISTER FORM -->
      <div class="form" id="form-register">
        <div class="field">
          <label>الاسم الكامل *</label>
          <input id="r_name" placeholder="مثال: أحمد محمد">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="field">
            <label>اسم المستخدم *</label>
            <input id="r_user" placeholder="ahmed" dir="ltr" oninput="checkUsername()">
          </div>
          <div class="field">
            <label>الهاتف</label>
            <input id="r_phone" placeholder="05xxxxxxxx" dir="ltr">
          </div>
        </div>
        <div class="field">
          <label>كلمة المرور *</label>
          <div class="pw-wrap">
            <input id="r_pass" type="password" placeholder="8 أحرف على الأقل"
              oninput="checkStrength()" style="padding-left:38px">
            <button class="pw-toggle" onclick="togglePw('r_pass',this)" type="button">👁</button>
          </div>
          <div class="pw-strength"><div class="pw-bar" id="pwBar"></div></div>
        </div>
        <div class="field">
          <label>تأكيد كلمة المرور *</label>
          <div class="pw-wrap">
            <input id="r_pass2" type="password" placeholder="أعد كتابة كلمة المرور"
              style="padding-left:38px" onkeydown="if(event.key==='Enter')register()">
            <button class="pw-toggle" onclick="togglePw('r_pass2',this)" type="button">👁</button>
          </div>
        </div>
        <div style="font-size:.72rem;color:#a0896a;background:#faf7f2;border:1px solid #ede6d8;border-radius:8px;padding:9px 12px;margin-bottom:14px;line-height:1.7">
          ⚠ الحساب الجديد يحتاج موافقة المدير لتفعيل الصلاحيات قبل الاستخدام الكامل
        </div>
        <button class="btn" onclick="register()">إنشاء الحساب</button>
        <div class="msg" id="r_msg"></div>
      </div>

    </div>
    <!-- end card -->

  </div>

<script src="sync.js"></script>
<script>
// Apply store name from settings
(function(){
  const s = DB.settings();
  if(s.store_name) document.getElementById('loginName').textContent = s.store_name;
  if(DB.session()) location.href = DB.firstAccessiblePage();
})();

// TAB SWITCH
function switchTab(t){
  ['login','register'].forEach(x=>{
    document.getElementById('tab-'+x).classList.toggle('on', x===t);
    document.getElementById('form-'+x).classList.toggle('on', x===t);
  });
  document.getElementById('l_err').textContent = '';
  document.getElementById('r_msg').textContent = '';
  document.getElementById('r_msg').className   = 'msg';
}

// SHOW/HIDE PASSWORD
function togglePw(id, btn){
  const inp = document.getElementById(id);
  inp.type  = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

// PASSWORD STRENGTH
function checkStrength(){
  const v = document.getElementById('r_pass').value;
  const bar = document.getElementById('pwBar');
  let score = 0;
  if(v.length >= 8)  score++;
  if(/[A-Z]/.test(v)) score++;
  if(/[0-9]/.test(v)) score++;
  if(/[^A-Za-z0-9]/.test(v)) score++;
  const w = [0,25,50,75,100][score];
  const c = ['','#c0392b','#e67e22','#C9A84C','#2e7d5c'][score];
  bar.style.width   = w + '%';
  bar.style.background = c;
}

// CHECK USERNAME AVAILABILITY
function checkUsername(){
  const v = document.getElementById('r_user').value.trim().toLowerCase();
  const inp = document.getElementById('r_user');
  if(!v){ inp.style.borderColor=''; return; }
  const taken = DB.account(v);
  inp.style.borderColor = taken ? '#c0392b' : '#2e7d5c';
}

// LOGIN
function login(){
  const u = document.getElementById('l_user').value.trim();
  const p = document.getElementById('l_pass').value;
  const e = document.getElementById('l_err');
  e.textContent = '';
  if(!u||!p){ e.textContent='أدخل اسم المستخدم وكلمة المرور'; return; }
  const acc = DB.account(u);
  if(!acc)          { e.textContent='اسم المستخدم غير موجود'; return; }
  if(!acc.active)   { e.textContent='الحساب موقوف — تواصل مع المدير'; return; }
  if(acc.password !== p){ e.textContent='كلمة المرور غير صحيحة'; return; }
  DB._set(DB.K.session, {
    id:acc.id, username:acc.username, name:acc.name,
    role:acc.role, permissions:acc.permissions||{}, loginAt:Date.now()
  });
  location.href = DB.firstAccessiblePage();
}

// REGISTER
function register(){
  const name  = document.getElementById('r_name').value.trim();
  const uname = document.getElementById('r_user').value.trim().toLowerCase();
  const phone = document.getElementById('r_phone').value.trim();
  const pass  = document.getElementById('r_pass').value;
  const pass2 = document.getElementById('r_pass2').value;
  const msg   = document.getElementById('r_msg');
  msg.textContent = '';
  msg.className   = 'msg';

  if(!name)             { msg.textContent='أدخل الاسم الكامل';        msg.className='msg err'; return; }
  if(!uname)            { msg.textContent='أدخل اسم المستخدم';        msg.className='msg err'; return; }
  if(DB.account(uname)) { msg.textContent='اسم المستخدم مستخدم بالفعل'; msg.className='msg err'; return; }
  if(pass.length < 6)   { msg.textContent='كلمة المرور 6 أحرف على الأقل'; msg.className='msg err'; return; }
  if(pass !== pass2)    { msg.textContent='كلمتا المرور غير متطابقتين'; msg.className='msg err'; return; }

  const accounts = DB.accounts();
  accounts.push({
    id:          'USR' + Date.now(),
    username:    uname,
    password:    pass,
    name:        name,
    phone:       phone,
    role:        'staff',
    permissions: {},       // no permissions until admin activates
    active:      false,      // inactive until admin approves
    created_at:  Date.now(),
  });
  DB.saveAccounts(accounts);

  msg.textContent = '✓ تم إنشاء الحساب — انتظر موافقة المدير لتفعيله';
  msg.className   = 'msg ok';
  // Clear form
  ['r_name','r_user','r_phone','r_pass','r_pass2'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('pwBar').style.width='0';
}

// RESET ADMIN — fixes login if account is broken
function resetAndLogin(){
  if(!confirm('هل تريد إعادة تعيين حساب المدير؟\nسيتم تسجيل الدخول بـ admin / admin123')) return;
  const list = DB.accounts();
  const idx  = list.findIndex(a => a.username === 'admin');
  const adminAcc = {
    id:'admin', username:'admin', password:'admin123',
    name:'مدير النظام', role:'admin', permissions:{}, active:true, created_at:Date.now()
  };
  if(idx >= 0) list[idx] = adminAcc;
  else list.push(adminAcc);
  DB.saveAccounts(list);
  DB._set(DB.K.session, {
    id:'admin', username:'admin', name:'مدير النظام',
    role:'admin', permissions:{}, loginAt:Date.now()
  });
  location.href = DB.firstAccessiblePage();
}
