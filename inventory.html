<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طيب الحي — المخزون</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-lt:#f0e4c0;--dark:#1C1208;--dark2:#2e2010;--cream:#F8F3EA;--cream2:#f0e8d8;--text:#2a1e0e;--text2:#6b5535;--text3:#a0896a;--border:#ddd0b8;--white:#fff;--red:#c0392b;--green:#2e7d5c;--R:10px;--SH:0 1px 4px rgba(28,18,8,.08),0 4px 14px rgba(28,18,8,.06)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}
a{text-decoration:none;color:inherit}button{font-family:inherit;cursor:pointer;border:none;background:none}
.nav{background:var(--dark);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50;border-bottom:1px solid #3a2a14}
.nav-brand{display:flex;align-items:center;gap:10px}
.nav-logo{width:34px;height:34px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;overflow:hidden}
.nav-logo img{width:100%;height:100%;object-fit:contain}
.nav-name{font-size:.95rem;font-weight:700;color:var(--gold)}
.nav-links{display:flex;gap:2px}
.nav-link{padding:6px 14px;border-radius:6px;font-size:.84rem;color:#c8b89a;transition:.15s}
.nav-link:hover{background:var(--dark2);color:var(--gold)}
.nav-link.active{background:var(--gold);color:var(--dark);font-weight:700}
.nav-user{font-size:.82rem;color:#c8b89a;background:var(--dark2);padding:4px 12px;border-radius:16px}
.nav-logout{font-size:.78rem;color:var(--text3);padding:4px 10px;border-radius:6px;transition:.15s;cursor:pointer}
.nav-logout:hover{color:#e07070;background:var(--dark2)}

/* SUB TABS */
.tabs-bar{background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;display:flex;gap:0}
.tab-btn{padding:13px 20px;font-size:.88rem;font-weight:600;color:var(--text3);border-bottom:3px solid transparent;transition:.15s;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none}
.tab-btn.active{color:var(--dark);border-bottom-color:var(--gold)}

.page{max-width:1280px;margin:0 auto;padding:24px 28px}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.search-inp{padding:9px 14px;border:1px solid var(--border);border-radius:8px;font-size:.88rem;background:var(--white);color:var(--text);width:240px;transition:.15s}
.search-inp:focus{outline:none;border-color:var(--gold)}
.filter-sel{padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:.85rem;background:var(--white);color:var(--text2);cursor:pointer}
.sort-sel{padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:.85rem;background:var(--white);color:var(--text2);cursor:pointer}
.toolbar-spacer{flex:1}
.alert-banner{background:#fff8ee;border:1px solid #f0c060;border-radius:8px;padding:10px 16px;font-size:.82rem;color:#7a5a10;display:flex;align-items:center;gap:8px;margin-bottom:14px}

/* GRID VIEW */
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.prod-card{background:var(--white);border:1px solid var(--border);border-radius:var(--R);box-shadow:var(--SH);overflow:hidden;transition:.15s;cursor:pointer}
.prod-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 4px 20px rgba(201,168,76,.15)}
.prod-card.low-stock{border-color:#f0c060}
.prod-card.out-stock{border-color:var(--red)}
.prod-card-img{width:100%;height:120px;object-fit:contain;background:var(--cream2);display:block}
.prod-card-img-placeholder{width:100%;height:120px;background:var(--cream2);display:flex;align-items:center;justify-content:center;font-size:2rem}
.prod-card-body{padding:12px}
.prod-card-name{font-size:.88rem;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-card-cat{font-size:.72rem;color:var(--text3);margin-bottom:8px}
.prod-card-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.qty-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:.74rem;font-weight:700}
.q-ok{background:#eef6f2;color:var(--green)}.q-low{background:#fff8ee;color:#9a6b10}.q-out{background:#fdf0ee;color:var(--red)}
.price-tag{font-family:'IBM Plex Mono',monospace;font-size:.8rem;font-weight:700;color:var(--dark)}

/* LIST VIEW */
.inv-tbl{width:100%;border-collapse:collapse}
.inv-tbl th{text-align:right;padding:9px 14px;font-size:.71rem;font-weight:600;color:var(--text3);background:var(--cream);border-bottom:1px solid var(--border);white-space:nowrap}
.inv-tbl td{padding:10px 14px;font-size:.83rem;border-bottom:1px solid #f0e8d8;vertical-align:middle}
.inv-tbl tr:hover td{background:var(--cream)}
.mono{font-family:'IBM Plex Mono',monospace;font-size:.78rem}

/* LOG */
.log-item{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid #f0e8d8}
.log-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.li-sale{background:#fdf0ee}.li-buy{background:#eef0fa}.li-adjust{background:var(--cream2)}
.log-info{flex:1}
.log-name{font-size:.85rem;font-weight:600}
.log-date{font-size:.72rem;color:var(--text3);margin-top:2px}
.log-qty{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:.9rem}
.log-qty.plus{color:var(--green)}.log-qty.minus{color:var(--red)}

/* EDIT MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:.2s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{background:var(--white);border-radius:12px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);background:var(--dark);position:sticky;top:0}
.modal-title{font-size:.95rem;font-weight:700;color:var(--gold)}
.modal-close{width:28px;height:28px;border-radius:6px;background:var(--dark2);color:#c8b89a;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s}
.modal-close:hover{background:var(--gold);color:var(--dark)}
.modal-body{padding:20px}
.f-row{margin-bottom:12px}
.f-lbl{display:block;font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:4px}
.f-inp{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:7px;font-size:.86rem;background:var(--cream);color:var(--text);transition:.15s;direction:rtl}
.f-inp:focus{outline:none;border-color:var(--gold);background:var(--white)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.save-btn{width:100%;padding:11px;background:var(--gold);color:var(--dark);border-radius:8px;font-size:.93rem;font-weight:700;cursor:pointer;transition:.15s;border:none;margin-top:8px;font-family:'Tajawal',sans-serif}
.save-btn:hover{background:#b8933e}
.del-btn{width:100%;padding:9px;background:none;color:var(--red);border:1px solid var(--red);border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;transition:.15s;margin-top:6px;font-family:'Tajawal',sans-serif}
.del-btn:hover{background:#fdf0ee}
.empty{display:flex;flex-direction:column;align-items:center;gap:8px;padding:50px 20px;text-align:center}
.empty-ic{font-size:2rem;width:54px;height:54px;background:var(--cream2);border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:4px}
.empty-t{font-size:.9rem;font-weight:700;color:var(--text2)}
.empty-d{font-size:.78rem;color:var(--text3);line-height:1.6;max-width:230px}
.empty-cta{margin-top:6px;padding:7px 18px;background:var(--gold);color:var(--dark);border-radius:7px;font-size:.82rem;font-weight:700;cursor:pointer;border:none;font-family:'Tajawal',sans-serif}
@media(max-width:900px){.nav-links{display:none}.page{padding:14px}}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">
    <div class="nav-logo" id="navLogo">🕌</div>
    <span class="nav-name" id="navName">طيب الحي</span>
  </div>
  <div class="nav-links">
    <a href="dashboard.html" class="nav-link">الرئيسية</a>
    <a href="cashier.html" class="nav-link">الكاشير</a>
    <a href="inventory.html" class="nav-link active">المخزون</a>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <span class="nav-user" id="navUser">—</span>
    <button class="nav-logout" onclick="logout()">خروج</button>
  </div>
</nav>

<div class="tabs-bar">
  <button class="tab-btn active" id="tb-products" onclick="switchTab('products')">📦 المنتجات</button>
  <button class="tab-btn" id="tb-log" onclick="switchTab('log')">📋 سجل الحركات</button>
</div>

<!-- PRODUCTS TAB -->
<div id="tab-products" class="page">
  <div id="alertBanner" style="display:none" class="alert-banner">
    <span>⚠</span><span id="alertMsg"></span>
  </div>
  <div class="toolbar">
    <input class="search-inp" id="searchInp" placeholder="ابحث بالاسم أو الباركود…" oninput="renderProducts()">
    <select class="filter-sel" id="filterCat" onchange="renderProducts()">
      <option value="">كل الفئات</option>
      <option>عود</option><option>دهن</option><option>بخور</option><option>مسك</option><option>زيت</option><option>أخرى</option>
    </select>
    <select class="filter-sel" id="filterStock" onchange="renderProducts()">
      <option value="">كل المخزون</option>
      <option value="low">منخفض</option>
      <option value="out">نفد</option>
    </select>
    <select class="sort-sel" id="sortBy" onchange="renderProducts()">
      <option value="name">ترتيب: الاسم</option>
      <option value="qty_asc">الكمية ↑</option>
      <option value="qty_desc">الكمية ↓</option>
      <option value="price">السعر</option>
      <option value="newest">الأحدث</option>
    </select>
    <div class="toolbar-spacer"></div>
    <button style="padding:8px 16px;background:var(--gold);color:var(--dark);border-radius:8px;font-weight:700;font-size:.84rem;transition:.15s" onclick="location.href='cashier.html?tab=buy'" onmouseover="this.style.background='#b8933e'" onmouseout="this.style.background='var(--gold)'">+ استلام بضاعة</button>
  </div>
  <div id="prodGrid"></div>
</div>

<!-- LOG TAB -->
<div id="tab-log" class="page" style="display:none">
  <div class="toolbar">
    <input class="search-inp" id="logSearch" placeholder="ابحث في السجل…" oninput="renderLog()">
    <select class="filter-sel" id="logFilter" onchange="renderLog()">
      <option value="">كل الأنواع</option>
      <option value="sale">مبيعات</option>
      <option value="purchase">مشتريات</option>
    </select>
    <div class="toolbar-spacer"></div>
    <span id="logCount" style="font-size:.78rem;color:var(--text3)"></span>
  </div>
  <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--R);box-shadow:var(--SH);overflow:hidden">
    <div id="logContainer"></div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">✏ تعديل المنتج</span>
      <button class="modal-close" onclick="closeEdit()">✕</button>
    </div>
    <div class="modal-body">
      <div class="f-row">
        <label class="f-lbl">صورة المنتج</label>
        <div id="editImgPreview" style="width:100%;height:100px;border:2px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;margin-bottom:6px" onclick="document.getElementById('editImgInp').click()"></div>
        <input type="file" id="editImgInp" accept="image/*" style="display:none" onchange="handleEditImg(this)">
      </div>
      <div class="form-grid">
        <div class="f-row" style="grid-column:1/-1"><label class="f-lbl">اسم المنتج</label><input class="f-inp" id="e_name"></div>
        <div class="f-row"><label class="f-lbl">الباركود</label><input class="f-inp" id="e_barcode" dir="ltr" readonly style="color:var(--text3)"></div>
        <div class="f-row"><label class="f-lbl">الفئة</label>
          <select class="f-inp" id="e_cat"><option>عود</option><option>دهن</option><option>بخور</option><option>مسك</option><option>زيت</option><option>أخرى</option></select>
        </div>
        <div class="f-row"><label class="f-lbl">الشركة</label><input class="f-inp" id="e_company"></div>
        <div class="f-row"><label class="f-lbl">المورد</label><input class="f-inp" id="e_supplier"></div>
        <div class="f-row"><label class="f-lbl">الوحدة</label><input class="f-inp" id="e_unit"></div>
        <div class="f-row"><label class="f-lbl">الكمية الحالية</label><input class="f-inp" id="e_qty" type="number" min="0"></div>
        <div class="f-row"><label class="f-lbl">سعر الشراء</label><input class="f-inp" id="e_cost" type="number" min="0" step="0.01"></div>
        <div class="f-row"><label class="f-lbl">سعر البيع</label><input class="f-inp" id="e_price" type="number" min="0" step="0.01"></div>
        <div class="f-row" style="grid-column:1/-1"><label class="f-lbl">ملاحظات</label><input class="f-inp" id="e_notes"></div>
      </div>
      <button class="save-btn" onclick="saveEdit()">حفظ التعديلات</button>
      <button class="del-btn" onclick="deleteProduct()">حذف المنتج</button>
    </div>
  </div>
</div>

<script src="sync.js"></script>
<script>
DB.requireAuth();
const user=DB.getUser();
document.getElementById('navUser').textContent=user?.name||user?.username||'مدير';

(function(){
  const s=DB.getSettings();
  document.getElementById('navName').textContent=s.store_name||'طيب الحي';
  if(s.logo){ document.getElementById('navLogo').innerHTML=`<img src="${s.logo}">`; }
})();

function logout(){ localStorage.removeItem(DB.KEYS.user); location.href='index.html'; }

let currentBarcode=null, editImgData=null;

function switchTab(t){
  ['products','log'].forEach(x=>{
    document.getElementById('tab-'+x).style.display=x===t?'block':'none';
    document.getElementById('tb-'+x).classList.toggle('active',x===t);
  });
  if(t==='log') renderLog();
}

// ── PRODUCTS ─────────────────────────────
function renderProducts(){
  const el=document.getElementById('prodGrid');
  const s=DB.getSettings();
  const search=document.getElementById('searchInp').value.trim().toLowerCase();
  const cat=document.getElementById('filterCat').value;
  const stockF=document.getElementById('filterStock').value;
  const sort=document.getElementById('sortBy').value;
  const low=s.low_stock_qty;

  let products=DB.getProducts();

  // alerts
  const lowItems=products.filter(p=>Number(p.qty||0)>0&&Number(p.qty||0)<=low);
  const outItems=products.filter(p=>Number(p.qty||0)<=0);
  const banner=document.getElementById('alertBanner');
  if(lowItems.length||outItems.length){
    banner.style.display='flex';
    const msgs=[];
    if(outItems.length) msgs.push(`${outItems.length} منتج نفد من المخزون`);
    if(lowItems.length) msgs.push(`${lowItems.length} منتج بالقرب من النفاد`);
    document.getElementById('alertMsg').textContent=msgs.join(' | ');
  } else banner.style.display='none';

  // filter
  if(search) products=products.filter(p=>(p.name||'').toLowerCase().includes(search)||(p.barcode||'').includes(search));
  if(cat) products=products.filter(p=>p.category===cat);
  if(stockF==='low') products=products.filter(p=>Number(p.qty||0)>0&&Number(p.qty||0)<=low);
  if(stockF==='out') products=products.filter(p=>Number(p.qty||0)<=0);

  // sort
  if(sort==='name') products.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  else if(sort==='qty_asc') products.sort((a,b)=>Number(a.qty||0)-Number(b.qty||0));
  else if(sort==='qty_desc') products.sort((a,b)=>Number(b.qty||0)-Number(a.qty||0));
  else if(sort==='price') products.sort((a,b)=>Number(a.price||0)-Number(b.price||0));
  else if(sort==='newest') products.sort((a,b)=>b.updated_at-a.updated_at);

  if(!products.length){
    el.innerHTML=`<div class="empty"><div class="empty-ic">📦</div><div class="empty-t">لا توجد منتجات</div><div class="empty-d">أضف منتجات عبر الكاشير ← استلام بضاعة</div><button class="empty-cta" onclick="location.href='cashier.html?tab=buy'">+ استلام بضاعة</button></div>`;
    return;
  }

  const cur=s.currency;
  el.innerHTML=`<div class="prod-grid">${products.map(p=>{
    const qty=Number(p.qty||0);
    const qcls=qty<=0?'q-out':qty<=low?'q-low':'q-ok';
    const qtxt=qty<=0?'نفد':qty<=low?`${qty} (منخفض)`:qty;
    const cardCls=qty<=0?'out-stock':qty<=low?'low-stock':'';
    const imgHtml=p.img?`<img class="prod-card-img" src="${p.img}">`:`<div class="prod-card-img-placeholder">${catIcon(p.category)}</div>`;
    return `<div class="prod-card ${cardCls}" onclick="openEdit('${p.barcode}')">
      ${imgHtml}
      <div class="prod-card-body">
        <div class="prod-card-name" title="${p.name}">${p.name}</div>
        <div class="prod-card-cat">${p.category||'—'} | ${p.unit||'وحدة'}</div>
        <div class="prod-card-row">
          <span class="qty-badge ${qcls}">${qtxt}</span>
          <span class="price-tag">${DB.fmt(p.price)} ${cur}</span>
        </div>
        ${p.company?`<div style="font-size:.7rem;color:var(--text3);margin-top:4px">${p.company}</div>`:''}
      </div>
    </div>`;
  }).join('')}</div>`;
}

function catIcon(cat){
  const m={عود:'🪵',دهن:'🧴',بخور:'🌫',مسك:'🌿',زيت:'💧'};
  return m[cat]||'📦';
}

// ── EDIT MODAL ────────────────────────────
function openEdit(barcode){
  const p=DB.getProduct(barcode); if(!p) return;
  currentBarcode=barcode; editImgData=null;
  document.getElementById('e_name').value=p.name||'';
  document.getElementById('e_barcode').value=p.barcode||'';
  document.getElementById('e_cat').value=p.category||'عود';
  document.getElementById('e_company').value=p.company||'';
  document.getElementById('e_supplier').value=p.supplier||'';
  document.getElementById('e_unit').value=p.unit||'';
  document.getElementById('e_qty').value=p.qty||0;
  document.getElementById('e_cost').value=p.cost||'';
  document.getElementById('e_price').value=p.price||'';
  document.getElementById('e_notes').value=p.notes||'';
  const ep=document.getElementById('editImgPreview');
  ep.innerHTML=p.img?`<img src="${p.img}" style="width:100%;height:100%;object-fit:contain">`:`<span style="color:var(--text3);font-size:.76rem">اضغط لرفع صورة</span>`;
  document.getElementById('editModal').classList.add('open');
}
function closeEdit(){ document.getElementById('editModal').classList.remove('open'); currentBarcode=null; }
function handleEditImg(inp){ const f=inp.files[0]; if(!f) return; const r=new FileReader(); r.onload=e=>{ editImgData=e.target.result; document.getElementById('editImgPreview').innerHTML=`<img src="${e.target.result}" style="width:100%;height:100%;object-fit:contain">`; }; r.readAsDataURL(f); }

function saveEdit(){
  if(!currentBarcode) return;
  const p=DB.getProduct(currentBarcode)||{};
  const oldQty=Number(p.qty||0);
  const newQty=Number(document.getElementById('e_qty').value)||0;
  DB.upsertProduct({
    ...p,
    name:     document.getElementById('e_name').value.trim(),
    category: document.getElementById('e_cat').value,
    company:  document.getElementById('e_company').value.trim(),
    supplier: document.getElementById('e_supplier').value.trim(),
    unit:     document.getElementById('e_unit').value.trim(),
    qty:      newQty,
    cost:     Number(document.getElementById('e_cost').value)||p.cost,
    price:    Number(document.getElementById('e_price').value)||p.price,
    notes:    document.getElementById('e_notes').value.trim(),
    img:      editImgData||p.img||null,
  });
  if(newQty!==oldQty){
    DB.addStockEntry({type:'adjust',barcode:currentBarcode,name:p.name,qty_change:newQty-oldQty,note:'تعديل يدوي'});
  }
  closeEdit(); renderProducts(); toast('تم حفظ التعديلات');
}

function deleteProduct(){
  if(!currentBarcode) return;
  if(!confirm('هل أنت متأكد من حذف هذا المنتج؟')) return;
  DB.deleteProduct(currentBarcode);
  closeEdit(); renderProducts(); toast('تم حذف المنتج','warning');
}

// ── LOG ───────────────────────────────────
function renderLog(){
  const el=document.getElementById('logContainer');
  const search=document.getElementById('logSearch').value.toLowerCase();
  const filter=document.getElementById('logFilter').value;
  let log=DB.getStockLog();
  if(search) log=log.filter(l=>(l.name||'').toLowerCase().includes(search)||(l.note||'').toLowerCase().includes(search));
  if(filter) log=log.filter(l=>l.type===filter);
  document.getElementById('logCount').textContent=`${log.length} حركة`;
  if(!log.length){ el.innerHTML=`<div class="empty"><div class="empty-ic">📋</div><div class="empty-t">لا توجد حركات بعد</div><div class="empty-d">تظهر هنا كل عمليات البيع والاستلام</div></div>`; return; }
  const typeIcon={sale:'🔴',purchase:'🔵',adjust:'🟡'};
  const typeLbl={sale:'بيع',purchase:'استلام',adjust:'تعديل'};
  el.innerHTML=log.map(l=>{
    const isPlus=Number(l.qty_change||0)>0;
    return `<div class="log-item">
      <div class="log-icon li-${l.type==='sale'?'sale':l.type==='purchase'?'buy':'adjust'}">${typeIcon[l.type]||'⚪'}</div>
      <div class="log-info">
        <div class="log-name">${l.name||'—'}</div>
        <div class="log-date">${typeLbl[l.type]||l.type} · ${DB.shortDate(l.created_at)}${l.note?' · '+l.note:''}</div>
      </div>
      <div class="log-qty ${isPlus?'plus':'minus'}">${isPlus?'+':''}${l.qty_change}</div>
    </div>`;
  }).join('');
}

renderProducts();
</script>
</body>
</html>
